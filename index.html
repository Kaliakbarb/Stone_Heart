         using a closure timer so it is self-contained. */
      eagleToSky: function (durationMs) {
        var dur = durationMs || 5000;
        var t0 = -1;
        return function (c, prog, tnow) {
          if (t0 < 0) t0 = tnow;
          var p = clamp((tnow - t0) / dur, 0, 1);
          // sky gradient from steppe-blue up to white void
          var top = PALETTE.skyWhite, bot = (typeof lerpColor === "function")
            ? lerpColor(PALETTE.skyBlue, PALETTE.skyWhite, p) : PALETTE.skyBlue;
          c.fillStyle = bot; c.fillRect(0, 0, Engine.W, Engine.H);
          // the shrinking pixel world (a little green steppe tile cluster)
          var scale = lerp(1, 0.04, p);
          var cw = 320 * scale, ch = 200 * scale;
          var cx = Engine.W / 2 - cw / 2, cy = Engine.H / 2 - ch / 2 + lerp(40, -180, p);
          c.save();
          c.globalAlpha = clamp(1 - p * 1.05, 0, 1);
          // ground
          c.fillStyle = PALETTE.grassDark; c.fillRect(cx, cy + ch * 0.55, cw, ch * 0.45);
          c.fillStyle = PALETTE.grassLight; c.fillRect(cx, cy + ch * 0.55, cw, ch * 0.12);
          // a river
          c.fillStyle = PALETTE.waterLight; c.fillRect(cx + cw * 0.2, cy + ch * 0.6, cw * 0.6, ch * 0.06);
          // a couple of yurts
          c.fillStyle = PALETTE.yurtWhite;
          c.fillRect(cx + cw * 0.3, cy + ch * 0.5, cw * 0.08, ch * 0.08);
          c.fillRect(cx + cw * 0.58, cy + ch * 0.52, cw * 0.07, ch * 0.07);
          c.restore();
          // the eagle silhouette, rising toward the void
          var ex = Engine.W / 2, ey = lerp(Engine.H * 0.7, Engine.H * 0.28, p);
          var esc = Math.max(1, Math.round(lerp(6, 3, p)));
          if (_ui_hasSprite("eagle_fly")) {
            _ui_sprite(c, "eagle_fly", ex - 8 * esc, ey, esc, {});
          } else if (_ui_hasSprite("eagle")) {
            _ui_sprite(c, "eagle", ex - 8 * esc, ey, esc, {});
          } else {
            c.fillStyle = PALETTE.outline;
            c.beginPath();
            c.moveTo(ex - 22, ey); c.lineTo(ex, ey - 8); c.lineTo(ex + 22, ey);
            c.lineTo(ex, ey + 4); c.closePath(); c.fill();
          }
          // white bloom near the top as it dissolves
          if (p > 0.6) {
            c.save();
            c.globalAlpha = clamp((p - 0.6) / 0.4, 0, 1);
            c.fillStyle = PALETTE.skyWhite;
            c.fillRect(0, 0, Engine.W, Engine.H);
            c.restore();
          }
        };
      },
      /* illusion labyrinth: a too-perfect green steppe that shimmers and
         (optionally) cracks apart. `cracking` true draws the dissolve. */
      illusion: function (cracking) {
        var t0 = -1;
        return function (c, prog, tnow) {
          if (t0 < 0) t0 = tnow;
          var dt = tnow - t0;
          // impossibly green, calm steppe
          c.fillStyle = PALETTE.skyHigh; c.fillRect(0, 0, Engine.W, Engine.H * 0.5);
          c.fillStyle = PALETTE.grassLight; c.fillRect(0, Engine.H * 0.5, Engine.W, Engine.H * 0.5);
          c.fillStyle = PALETTE.grassDark; c.fillRect(0, Engine.H * 0.62, Engine.W, Engine.H * 0.38);
          // a warm sun
          c.fillStyle = PALETTE.gold;
          c.beginPath(); c.arc(Engine.W * 0.78, Engine.H * 0.22, 26, 0, Math.PI * 2); c.fill();
          // two warm figures (mother + father), gently bobbing
          var bob = Math.sin(dt / 600) * 3;
          c.fillStyle = PALETTE.feltRed;
          c.fillRect(Engine.W * 0.42, Engine.H * 0.5 + bob, 18, 40);
          c.fillStyle = PALETTE.earth;
          c.fillRect(Engine.W * 0.52, Engine.H * 0.5 - bob, 18, 40);
          // shimmer overlay
          c.save();
          c.globalAlpha = 0.06 + 0.04 * (0.5 + 0.5 * Math.sin(dt / 220));
          c.fillStyle = PALETTE.yurtWhite; c.fillRect(0, 0, Engine.W, Engine.H);
          c.restore();
          if (cracking) {
            // violet cracks spider across as the illusion shatters
            var p = clamp(dt / 1800, 0, 1);
            c.save();
            c.strokeStyle = PALETTE.crackLight; c.lineWidth = 2;
            c.globalAlpha = p;
            for (var k = 0; k < 7; k++) {
              var sx = (Engine.W / 6) * k;
              c.beginPath();
              c.moveTo(sx, 0);
              c.lineTo(sx + Math.sin(k * 1.3) * 60 * p, Engine.H * p);
              c.lineTo(sx + Math.cos(k) * 40 * p, Engine.H);
              c.stroke();
            }
            // fading to black underneath
            c.globalAlpha = p * 0.7;
            c.fillStyle = "#000000"; c.fillRect(0, 0, Engine.W, Engine.H);
            c.restore();
          }
        };
      },
      /* a death beat: the screen drains color to grey, then darkens. */
      death: function () {
        var t0 = -1;
        return function (c, prog, tnow) {
          if (t0 < 0) t0 = tnow;
          var p = clamp((tnow - t0) / 2400, 0, 1);
          c.fillStyle = (typeof lerpColor === "function")
            ? lerpColor(PALETTE.caveDark, "#000000", p) : "#000000";
          c.fillRect(0, 0, Engine.W, Engine.H);
          // a guttering fire that fades
          c.save();
          c.globalAlpha = clamp(1 - p, 0, 1);
          var fy = Engine.H / 2 + 30;
          c.fillStyle = PALETTE.caveFire;
          c.fillRect(Engine.W / 2 - 8, fy, 16, 18 - Math.round(p * 14));
          c.restore();
        };
      },
      /* a single NPC vignette card for the final-titles montage. */
      vignette: function (spriteKey, label) {
        return function (c) {
          c.fillStyle = PALETTE.night; c.fillRect(0, 0, Engine.W, Engine.H);
          // soft vignette glow
          c.save();
          var sc = 7;
          var sw = 16 * sc;
          var x = Engine.W / 2, y = Engine.H / 2 - 30;
          if (spriteKey && _ui_hasSprite(spriteKey)) {
            _ui_sprite(c, spriteKey, x - sw / 2, y - sw / 2, sc, {});
          } else {
            c.fillStyle = PALETTE.earth; c.fillRect(x - 24, y - 24, 48, 48);
          }
          c.restore();
          if (label) {
            drawText(c, label, Engine.W / 2, y + 90, { color: PALETTE.gold, size: 18, align: "center", maxWidth: Engine.W - 120, lineHeight: 24 });
          }
        };
      }
    }
  };
})();

(function () {

    exit: function () { /* music is stopped by whatever scene we go to, or below */ },

    update: function (dt) {

    render: function (c) {

      var p = 0.5 + 0.5 * Math.sin(this.t / 2600);
      c.fillStyle = PALETTE.night; c.fillRect(0, 0, Engine.W, Engine.H);
      // sky bands
      c.fillStyle = (typeof lerpColor === "function") ? lerpColor(PALETTE.night, PALETTE.skyBlue, 0.5) : PALETTE.skyBlue;
      c.fillRect(0, 0, Engine.W, Engine.H * 0.55);

      c.fillStyle = (typeof lerpColor === "function") ? lerpColor(PALETTE.gold, PALETTE.yurtWhite, 0.4) : PALETTE.yurtWhite;

        if (a === "up") { this.setIdx = (this.setIdx + rows.length - 1) % rows.length; _ui_audio("sfx_select"); }
        else if (a === "down") { this.setIdx = (this.setIdx + 1) % rows.length; _ui_audio("sfx_select"); }

/* =====================================================================
   ENDING SCENES — Chapter 8 (three endings).
   Each ending: a cutscene montage (verbatim epilogue quotes + NPC
   vignettes) then a quiet final card. Built on Cutscene + scene render.
   Verbatim text from DESIGN.md §8.
   ===================================================================== */

/* shared helper: a slow scrolling/holding ending screen with a final
   epigraph card. We build each as a small scene that plays an internal
   Cutscene montage on enter, then shows the final still + quote. */
function _makeEndingScene(cfg) {
  return {
    t: 0,
    phase: "montage",       // "montage" -> "final"
    quoteShown: false,
    _gotoFinal: false,      // one-shot: set by the montage's onDone before re-entry
    _launch: false,         // defer Cutscene.play to the first update tick

    enter: function () {
      this.t = 0;
      this.quoteShown = false;
      // If the montage just finished and handed control back to us, render the
      // final still directly — do NOT replay the cinematic (avoids a re-enter loop).
      if (this._gotoFinal) {
        this._gotoFinal = false;
        this.phase = "final";
        this._launch = false;
        if (cfg.finalCue) _ui_audio(cfg.finalCue);

      // genuinely-committed current scene and no fade-commit is in flight.

    },

    exit: function () {

      // one-shot so a fresh playthrough replays the montage.

      this.t += dt;

          Cutscene.play(cfg.timeline(), function () {
            // flag the final phase, then re-enter THIS scene to draw it
            self._gotoFinal = true;

          });
        } else {
          this.phase = "final";
          if (cfg.finalCue) _ui_audio(cfg.finalCue);
        }
      }
    },

    render: function (c) {
      if (this.phase !== "final") {

        // rendered during montage (e.g. re-entry), draw a calm field.
        c.fillStyle = PALETTE.night; c.fillRect(0, 0, Engine.W, Engine.H);

      else { c.fillStyle = PALETTE.night; c.fillRect(0, 0, Engine.W, Engine.H); }

      // title of the ending
      var a = clamp(this.t / 800, 0, 1);
      c.save(); c.globalAlpha = a;
      drawText(c, cfg.titleRu, Engine.W / 2, 92, { color: PALETTE.gold, size: 30, align: "center" });
      drawText(c, cfg.titleSub, Engine.W / 2, 122, { color: PALETTE.boneGrey, size: 15, align: "center" });
      c.restore();

      // the verbatim epilogue quote, fading in after a beat

      if (qa > 0) {

        // quote band

  /* ------------------------------------------------------------------ */
  /* ch1_intro — THE WHOLE-GAME FIRST SCENE.                             */
  /* Cold open: Erzhan already in the steppe at dawn, no splash, no       */
  /* tutorial text. He tries the dombra passage that always breaks.        */
  /* Space (action "dombra") to play; it always breaks at the end.         */
  /* When the player has tried it, returning to the aul: grass at the gate */
  /* is grey (handled by the aul map's grey gate tiles + seeded decay).    */
  /* ------------------------------------------------------------------ */
  Scenes.register("ch1_intro", {
    blockPause: true,
    _t: 0,
    _tries: 0,
    _breakAt: 0,         // ms timestamp when the passage "breaks"
    _playing: false,
    _hint: 0,            // grows so a faint prompt eventually appears
    _phase: "steppe",    // "steppe" -> player free to play -> "leave"
    _note: 0,            // pulsing note index for the little dombra animation
    _leaveT: 0,

    enter: function () {
      this._t = 0; this._tries = 0; this._breakAt = 0; this._playing = false;
      this._hint = 0; this._phase = "steppe"; this._note = 0; this._leaveT = 0;
      if (G) G.chapter = 1;
      // seed the dying steppe (DESIGN §1.2 ~80% grey). Idempotent / guarded.
      try {
        if (typeof Decay !== "undefined" && Decay && Decay.seed) {
          if (!G.worldDecay || G.worldDecay.jetiqaz === undefined) Decay.seed("jetiqaz", 0.8);
          if (!G.worldDecay || G.worldDecay.koblandy === undefined) Decay.seed("koblandy", 0.85);
        }
      } catch (e) {}
      // the unfinished kui as ambient (loops); it is the passage he keeps trying
      cue("kui_erzhan_unfinished");
    },
    exit: function () { stopMusic(); },

    update: function (dt) {
      this._t += dt;
      this._hint += dt;
      if (this._playing) {
        this._note += dt;
        // the passage always BREAKS near the end (~2.0s in)
        if (this._t >= this._breakAt) {
          this._playing = false;
          cue("sfx_cancel"); // the broken note
        }
      }
      if (this._phase === "leave") {
        this._leaveT += dt;
        if (this._leaveT > 2600) {
          this._phase = "done";
          go("ch1_aul", { spawn: "from_steppe" });
        }
      }
    },

    onKey: function (e) {
      if (!e) return;
      if (this._phase !== "steppe") return;
      if (e.action === "dombra") {
        // play the passage; it breaks every time
        this._playing = true;
        this._t = 0;
        this._note = 0;
        this._breakAt = 2000;
        this._tries += 1;
        cue("kui_erzhan_unfinished");
      } else if (e.action === "confirm" && this._tries >= 1) {
        // after at least one attempt, return to the aul (grass at the gate is grey)
        this._phase = "leave";
        this._leaveT = 0;
        cue("sfx_confirm");
      }
    },

    render: function (c) {
      var t = this._t;
      // dawn sky: deep blue high -> warm gold low (rassvet)
      backdrop(c, pal("skyBlue", "#2980B9"), pal("gold", "#D4A017"));
      var w = W(), h = H();

      // low sun on the horizon
      var sunY = h * 0.62;
      c.save();
      c.globalAlpha = 0.9;
      c.fillStyle = pal("gold", "#D4A017");
      c.beginPath();
      try { c.arc(w * 0.5, sunY, 46, 0, Math.PI * 2); c.fill(); } catch (e) {}
      c.globalAlpha = 0.35;
      try { c.arc(w * 0.5, sunY, 70, 0, Math.PI * 2); c.fill(); } catch (e2) {}
      c.restore();

      // greying steppe ground (decay-tinted band)
      var groundY = h * 0.66;
      var lvl = decayLevel("jetiqaz");
      var grassCol = pal("grassDark", "#4E7A33");
      var groundCol = grassCol;
      try { if (typeof lerpColor === "function") groundCol = lerpColor(grassCol, pal("greySteppe", "#8A8A7A"), lvl); } catch (e3) {}
      c.fillStyle = groundCol;
      c.fillRect(0, groundY, w, h - groundY);

      // a few tufts of grass, greyer toward the right (the rot moves east->west)
      for (var i = 0; i < 60; i++) {
        var gx = (i * 53) % w;
        var gy = groundY + 8 + ((i * 37) % (h - groundY - 14));
        var localGrey = clampL(lvl + (gx / w) * 0.25, 0, 1);
        var tuft = grassCol;
        try { if (typeof lerpColor === "function") tuft = lerpColor(grassCol, pal("greySteppe", "#8A8A7A"), localGrey); } catch (e4) {}
        c.fillStyle = tuft;
        c.fillRect(gx, gy, 2, 4);
        c.fillRect(gx + 2, gy - 1, 2, 5);
      }

      // Ержан standing at dawn with the dombra (sprite, with graceful fallback)
      var ex = Math.round(w * 0.5 - 24);
      var ey = Math.round(groundY - 44);
      var drew = sprite(c, "erzhan", ex, ey, 4, {});
      if (!drew) {
        // fallback figure
        c.fillStyle = pal("skyBlue", "#2980B9");
        c.fillRect(ex + 14, ey + 6, 20, 38);
        c.fillStyle = pal("outline", "#1A0A00");
        c.fillRect(ex + 16, ey, 16, 12);
      }
      // the dombra icon at his hands, pulsing while playing
      var dix = ex + 30, diy = ey + 22;
      var pulse = this._playing ? (0.6 + 0.4 * Math.abs(Math.sin(this._note / 90))) : 0.5;
      c.save();
      c.globalAlpha = pulse;
      var dd = sprite(c, "dombra_icon", dix, diy, 3, {});
      if (!dd) {
        c.fillStyle = pal("earth", "#7D4E2A");
        c.fillRect(dix, diy + 6, 18, 8);
        c.fillRect(dix + 16, diy - 2, 4, 16);
      }
      c.restore();

      // when playing, a row of pentatonic "notes" that BREAKS near the end
      if (this._playing) {
        var prog = clampL(t / this._breakAt, 0, 1);
        var notes = 8;
        var shown = Math.floor(prog * notes);
        for (var k = 0; k < shown; k++) {
          var nx = w * 0.5 - 70 + k * 18;
          var ny = groundY - 70 - (Math.sin(k * 0.9) * 10);
          c.fillStyle = pal("gold", "#D4A017");
          c.fillRect(nx, ny, 5, 5);
        }
        // the break: last note glitches red
        if (prog > 0.9) {
          c.fillStyle = pal("feltRed", "#C0392B");
          c.fillRect(w * 0.5 - 70 + (notes - 1) * 18, groundY - 86, 6, 6);
        }
      }

      // sparse, diegetic prompt (no tutorial wall): only after a beat of stillness
      if (this._phase === "steppe") {
        if (this._hint > 1800 && !this._playing) {
          var blink = (Math.floor(this._t / 600) % 2) === 0;
          if (blink) {
            txt(c, "Space", w * 0.5, h - 40,
              { color: pal("yurtWhite", "#F5ECD7"), size: 14, align: "center" });
          }
          if (this._tries >= 1) {
            txt(c, "Z", w * 0.5, h - 20,
              { color: pal("boneGrey", "#B8B4A4"), size: 12, align: "center" });
          }
        }
      } else if (this._phase === "leave") {
        // fade-to-aul beat: he turns toward the aul; the gate-grass note
        var a = clampL(this._leaveT / 1600, 0, 1);
        c.save();
        c.globalAlpha = a;
        c.fillStyle = "#000000";
        c.fillRect(0, 0, w, h);
        c.restore();
        txt(c, "Трава у входа серая. Вчера была зелёная.", w / 2, h / 2,
          { color: pal("boneGrey", "#B8B4A4"), size: 16, align: "center", maxWidth: w - 120 });
      }
    }
  });

  /* ------------------------------------------------------------------ */
  /* ch1_aul — the village overworld (free roam).                        */
  /* Built on World.makeExploreScene; on first arrival the grey gate-grass  */
  /* is visible. Talking to Бейсен -> ch1_beysen. After the legend, the   */
  /* four-directions quest is available; the night scene gate too.        */
  /* ------------------------------------------------------------------ */
  (function registerAulScene() {
    var base = null;
    if (typeof World !== "undefined" && World && World.makeExploreScene) {
      base = World.makeExploreScene("aul_jetiqaz", {
        spawn: "from_steppe",
        onEnter: function () {
          cue("theme_aul");
          questStart("q_four_directions");
        },
        onExit: function () { /* music continues into sub-scenes intentionally */ },
        onRender: function (c) {
          // contextual objective line, faint, top-right
          var msg = null;
          if (!flag("knowsLegend")) {
            msg = "Поговори с аксакалом Бейсеном.";
          } else if (!flag("fourDirectionsDone")) {
            msg = "Обойди аул: четыре стороны света.";
          } else {
            msg = "Ночь близко. Вернись к огню.";
          }
          if (msg && !dialogueActive()) {
            c.save();
            c.globalAlpha = 0.8;
            txt(c, msg, W() - 14, 26, { color: pal("gold", "#D4A017"), size: 12, align: "right" });
            c.restore();
          }
        }
      });
    }
    // if World is unavailable, a defensive fallback scene that still advances
    if (!base) {
      base = {
        render: function (c) {
          c.fillStyle = pal("night", "#0E0F1A");
          c.fillRect(0, 0, W(), H());
          txt(c, "АУЛ ЖЕТІҚАЗ", W() / 2, H() / 2 - 10, { color: pal("gold", "#D4A017"), size: 22, align: "center" });
          txt(c, "Z — к аксакалу", W() / 2, H() / 2 + 24, { color: pal("boneGrey", "#B8B4A4"), size: 14, align: "center" });
        },
        onKey: function (e) { if (e && e.action === "confirm") go("ch1_beysen"); }
      };
    }
    // wrap onKey so that after the legend is known and the quest done, pressing
    // confirm near the campfire at night triggers ch1_night — but the simplest,
    // robust route is a dedicated decision: once fourDirectionsDone, offer night.
    var wrappedKey = base.onKey;
    base.onKey = function (e) {
      if (typeof wrappedKey === "function") { try { wrappedKey.call(base, e); } catch (er) {} }
      if (!e || dialogueActive()) return;
      if (e.action === "cancel") return; // pause handled by engine
    };
    // when the four-directions quest just completed, auto-advance to night on
    // the next overworld update (so the player isn't left without a trigger).
    var wrappedUpdate = base.update;
    base.update = function (dt) {
      if (typeof wrappedUpdate === "function") { try { wrappedUpdate.call(base, dt); } catch (er) {} }
      if (flag("fourDirectionsDone") && !flag("nightStarted") && !dialogueActive()) {
        setFlag("nightStarted", true);
        go("ch1_night");
      }
    };
    Scenes.register("ch1_aul", base);
  })();

  /* ------------------------------------------------------------------ */
  /* ch1_beysen — Scene 1.1, full verbatim dialogue (the cracked map).    */
  /* Renders the yurt interior + fire, runs TREE_ch1_beysen, then sends   */
  /* the player to the four-directions quest.                             */
  /* ------------------------------------------------------------------ */
  Scenes.register("ch1_beysen", {
    blockPause: true,
    _started: false,
    _t: 0,
    enter: function () {
      this._started = false;
      this._t = 0;
      stopMusic();
    },
    update: function (dt) {
      this._t += dt;
      if (!this._started) {
        this._started = true;
        startDialogue(TREE_ch1_beysen, function () {
          questStart("q_four_directions");
          go("ch1_quest");
        });
      }
      driveDialogueUpdate(dt);
    },
    onKey: function (e) { driveDialogueKey(e); },
    render: function (c) {
      // yurt interior: warm felt walls, central fire
      backdrop(c, pal("earth", "#7D4E2A"), pal("caveDark", "#171826"));
      var w = W(), h = H();
      // felt wall band
      c.fillStyle = pal("feltRed", "#C0392B");
      c.save(); c.globalAlpha = 0.18; c.fillRect(0, 0, w, h * 0.5); c.restore();
      // floor
      c.fillStyle = pal("earth", "#7D4E2A");
      c.fillRect(0, h * 0.62, w, h * 0.38);

      // the central fire (campfire), flickering
      var fx = w * 0.5, fy = h * 0.5;
      var flick = 0.7 + 0.3 * Math.abs(Math.sin(this._t / 120));
      if (!sprite(c, "campfire", Math.round(fx - 16), Math.round(fy - 8), 2, {})) {
        c.save(); c.globalAlpha = flick;
        c.fillStyle = pal("caveFire", "#E8B25A");
        c.beginPath();
        try { c.moveTo(fx, fy - 22); c.lineTo(fx - 12, fy + 8); c.lineTo(fx + 12, fy + 8); c.closePath(); c.fill(); } catch (e) {}
        c.restore();
      }
      c.save(); c.globalAlpha = 0.25 * flick;
      c.fillStyle = pal("caveFire", "#E8B25A");
      try { c.beginPath(); c.arc(fx, fy, 80, 0, Math.PI * 2); c.fill(); } catch (e2) {}
      c.restore();

      // Бейсен seated (left), Ержан standing (right) — sprites with fallbacks
      if (!sprite(c, "beysen", Math.round(w * 0.30 - 24), Math.round(fy - 36), 3, {})) {
        c.fillStyle = pal("boneGrey", "#B8B4A4");
        c.fillRect(w * 0.30 - 12, fy - 30, 24, 40);
      }
      if (!sprite(c, "erzhan", Math.round(w * 0.66 - 24), Math.round(fy - 40), 3, { flip: true })) {
        c.fillStyle = pal("skyBlue", "#2980B9");
        c.fillRect(w * 0.66 - 12, fy - 34, 24, 42);
      }

      // the cracked old map appears once Бейсен reveals it (knowsLegend or late tree)
      if (flag("knowsLegend") || this._t > 4000) {
        var mx = w * 0.5 - 40, my = h * 0.18;
        c.fillStyle = pal("bone", "#D8CFB8");
        c.fillRect(mx, my, 80, 54);
        c.strokeStyle = pal("earth", "#7D4E2A");
        c.lineWidth = 2;
        try { c.strokeRect(mx + 1, my + 1, 78, 52); } catch (e3) {}
        // the crack down the middle
        c.strokeStyle = pal("outline", "#1A0A00");
        c.lineWidth = 2;
        try {
          c.beginPath();
          c.moveTo(mx + 40, my + 2);
          c.lineTo(mx + 36, my + 18);
          c.lineTo(mx + 44, my + 34);
          c.lineTo(mx + 38, my + 52);
          c.stroke();
        } catch (e4) {}
      }

      // dialogue overlay on top
      driveDialogueRender(c);
    }
  });

  /* ------------------------------------------------------------------ */
  /* ch1_quest — Scene 1.2: four directions.                             */
  /* Four compass points (N/E/S/W). Each shows a dying-land symbol + a    */
  /* short villager line. The spring (W) holds the boot footprint with    */
  /* the Ordo mark (triangle with a dot). Visiting all four completes the */
  /* quest and returns to the aul (which then advances to night).          */
  /* ------------------------------------------------------------------ */
  Scenes.register("ch1_quest", {
    blockPause: true,
    _t: 0,
    _sel: 0,            // selected compass index 0..3
    _busy: false,
    // index order: 0 N(cattle) 1 E(earth) 2 S(birds) 3 W(spring)
    _points: [
      { dir: "С", x: 0.5, y: 0.16, label: "Север", sym: "cattle", flag: "sawCattle", tree: "cattle", title: "Мёртвый скот" },
      { dir: "В", x: 0.82, y: 0.5, label: "Восток", sym: "earth", flag: "sawEarth", tree: "earth", title: "Потрескавшаяся земля" },
      { dir: "Ю", x: 0.5, y: 0.84, label: "Юг", sym: "birds", flag: "sawBirds", tree: "birds", title: "Замолчавшие птицы" },
      { dir: "З", x: 0.18, y: 0.5, label: "Запад", sym: "spring", flag: "sawSpring", tree: "spring", title: "Пересохший родник" }
    ],
    enter: function () {
      this._t = 0; this._sel = 0; this._busy = false;
      cue("theme_overworld");
      questStart("q_four_directions");
    },
    exit: function () { stopMusic(); },
    _treeFor: function (key) {
      if (key === "cattle") return TREE_ch1_cattle;
      if (key === "earth") return TREE_ch1_earth;
      if (key === "birds") return TREE_ch1_birds;
      if (key === "spring") return TREE_ch1_spring;
      return null;
    },
    _allSeen: function () {
      for (var i = 0; i < this._points.length; i++) {
        if (!flag(this._points[i].flag)) return false;
      }
      return true;
    },
    update: function (dt) {
      this._t += dt;
      if (dialogueActive()) { driveDialogueUpdate(dt); return; }
      if (this._busy) {
        // a point's dialogue just ended; check completion
        this._busy = false;
        if (this._allSeen()) {
          setFlag("fourDirectionsDone", true);
          questComplete("q_four_directions");
          // brief beat then back to the aul (which auto-advances to night)
        }
      }
    },
    onKey: function (e) {
      if (!e) return;
      if (dialogueActive()) { driveDialogueKey(e); return; }
      if (this._busy) return;
      var n = this._points.length;
      if (e.action === "left" || e.action === "up") {
        this._sel = (this._sel + n - 1) % n; cue("sfx_select");
      } else if (e.action === "right" || e.action === "down") {
        this._sel = (this._sel + 1) % n; cue("sfx_select");
      } else if (e.action === "confirm") {
        if (this._allSeen()) {
          // all symbols seen: leave for the aul
          cue("sfx_confirm");
          go("ch1_aul", { spawn: "from_steppe" });
          return;
        }
        var p = this._points[this._sel];
        var tree = this._treeFor(p.tree);
        var self = this;
        this._busy = true;
        cue("sfx_confirm");
        startDialogue(tree, function () {
          self._busy = true; // update() will resolve completion next frame
        });
      } else if (e.action === "choice1" || e.action === "choice2" ||
                 e.action === "choice3" || e.action === "choice4") {
        // jump straight to a point by number
        var idx = e.action === "choice1" ? 0 : e.action === "choice2" ? 1 :
                  e.action === "choice3" ? 2 : 3;
        this._sel = idx; cue("sfx_select");
      }
    },
    _drawSymbol: function (c, sym, cx, cy, seen) {
      // each dying-land symbol drawn defensively (no sprite dependency)
      c.save();
      var col = seen ? pal("boneGrey", "#B8B4A4") : pal("feltRed", "#C0392B");
      if (sym === "cattle") {
        // a fallen animal silhouette
        c.fillStyle = col;
        c.fillRect(cx - 14, cy - 2, 28, 8);
        c.fillRect(cx + 10, cy - 8, 6, 8);   // head down
        c.fillRect(cx - 12, cy + 6, 3, 6);   // legs
        c.fillRect(cx + 8, cy + 6, 3, 6);
      } else if (sym === "earth") {
        // cracked ground
        c.strokeStyle = col; c.lineWidth = 2;
        try {
          c.beginPath();
          c.moveTo(cx - 16, cy); c.lineTo(cx - 4, cy - 6); c.lineTo(cx + 6, cy + 4); c.lineTo(cx + 16, cy - 2);
          c.moveTo(cx - 2, cy - 4); c.lineTo(cx, cy + 10);
          c.stroke();
        } catch (e) {}
      } else if (sym === "birds") {
        // silent birds (small + a 'no sound' arc)
        c.fillStyle = col;
        c.fillRect(cx - 10, cy - 2, 5, 3);
        c.fillRect(cx + 4, cy - 6, 5, 3);
        c.fillRect(cx - 2, cy + 4, 5, 3);
      } else if (sym === "spring") {
        // dry spring bed + (if found) the Ordo bootprint mark
        c.strokeStyle = col; c.lineWidth = 2;
        try { c.beginPath(); c.arc(cx, cy, 12, 0.2 * Math.PI, 0.8 * Math.PI); c.stroke(); } catch (e2) {}
        if (flag("foundOrdoMark")) {
          // the Ordo mark: triangle with a dot inside
          c.strokeStyle = pal("crackLight", "#7A3CE0"); c.lineWidth = 2;
          try {
            c.beginPath();
            c.moveTo(cx, cy - 12); c.lineTo(cx - 11, cy + 8); c.lineTo(cx + 11, cy + 8); c.closePath();
            c.stroke();
          } catch (e3) {}
          c.fillStyle = pal("crackLight", "#7A3CE0");
          c.fillRect(cx - 2, cy - 1, 4, 4);
        }
      }
      c.restore();
    },
    render: function (c) {
      var w = W(), h = H();
      // greying steppe seen from above (compass view)
      var lvl = decayLevel("jetiqaz");
      var ground = pal("grassDark", "#4E7A33");
      var gcol = ground;
      try { if (typeof lerpColor === "function") gcol = lerpColor(ground, pal("greySteppe", "#8A8A7A"), lvl); } catch (e) {}
      c.fillStyle = gcol;
      c.fillRect(0, 0, w, h);

      // title
      txt(c, "ЧЕТЫРЕ СТОРОНЫ СВЕТА", w / 2, 40, { color: pal("gold", "#D4A017"), size: 18, align: "center" });

      // central aul marker
      var ccx = w * 0.5, ccy = h * 0.5;
      if (!sprite(c, "yurt", Math.round(ccx - 16), Math.round(ccy - 16), 2, {})) {
        c.fillStyle = pal("yurtWhite", "#F5ECD7");
        c.beginPath();
        try { c.moveTo(ccx, ccy - 14); c.lineTo(ccx - 16, ccy + 10); c.lineTo(ccx + 16, ccy + 10); c.closePath(); c.fill(); } catch (e2) {}
      }
      txt(c, "Аул", ccx, ccy + 30, { color: pal("boneGrey", "#B8B4A4"), size: 11, align: "center" });

      // the four points
      for (var i = 0; i < this._points.length; i++) {
        var p = this._points[i];
        var px = p.x * w, py = p.y * h;
        var seen = flag(p.flag);
        var sel = (i === this._sel) && !this._allSeen();

        // line from aul to point
        c.save();
        c.globalAlpha = 0.3;
        c.strokeStyle = pal("boneGrey", "#B8B4A4");
        c.lineWidth = 1;
        try { c.beginPath(); c.moveTo(ccx, ccy); c.lineTo(px, py); c.stroke(); } catch (e3) {}
        c.restore();

        // selection ring
        if (sel) {
          var pr = 26 + Math.sin(this._t / 200) * 3;
          c.save();
          c.strokeStyle = pal("gold", "#D4A017");
          c.lineWidth = 2;
          try { c.beginPath(); c.arc(px, py, pr, 0, Math.PI * 2); c.stroke(); } catch (e4) {}
          c.restore();
        }

        this._drawSymbol(c, p.sym, px, py, seen);

        // labels
        txt(c, p.dir, px, py - 30, { color: sel ? pal("gold", "#D4A017") : pal("yurtWhite", "#F5ECD7"), size: 14, align: "center" });
        txt(c, p.title, px, py + 34, { color: seen ? pal("boneGrey", "#B8B4A4") : pal("yurtWhite", "#F5ECD7"), size: 11, align: "center", maxWidth: 150 });
        if (seen) {
          txt(c, "✓", px + 22, py - 22, { color: pal("grassLight", "#7CA646"), size: 14, align: "center", shadow: false });
        }
      }

      // footer prompt
      var allSeen = this._allSeen();
      var foot = allSeen
        ? "Все четыре стороны увидены.  Z — вернуться в аул"
        : "←/→ — выбрать сторону   Z — подойти   (1–4 — быстрый выбор)";
      c.save(); c.globalAlpha = 0.85;
      txt(c, foot, w / 2, h - 18, { color: allSeen ? pal("gold", "#D4A017") : pal("boneGrey", "#B8B4A4"), size: 12, align: "center" });
      c.restore();

      // a quiet note about the discovered Ordo mark
      if (flag("foundOrdoMark") && !allSeen) {
        txt(c, "След в сапоге с орнаментом — треугольник с точкой. Знак Ордо.",
          w / 2, h - 40, { color: pal("crackLight", "#7A3CE0"), size: 11, align: "center", maxWidth: w - 80 });
      }

      // dialogue overlay
      driveDialogueRender(c);
    }
  });

  /* ------------------------------------------------------------------ */
  /* ch1_night — Scene 1.3: night before leaving (mother Гүлнар).         */
  /* Verbatim dialogue, then the chapter-closing epigraph, then hand-off  */
  /* to Chapter 2.                                                        */
  /* ------------------------------------------------------------------ */
  Scenes.register("ch1_night", {
    blockPause: true,
    _started: false,
    _t: 0,
    _phase: "scene",   // "scene" (dombra+dialogue) -> "epigraph" -> "done"
    _epiT: 0,
    enter: function () {
      this._started = false; this._t = 0; this._phase = "scene"; this._epiT = 0;
      stopMusic();
      // he sits alone at the fire, tries the same passage again
      cue("kui_erzhan_unfinished");
    },
    exit: function () { stopMusic(); },
    update: function (dt) {
      this._t += dt;
      if (this._phase === "scene") {
        if (!this._started) {
          this._started = true;
          var self = this;
          startDialogue(TREE_ch1_mother, function () {
            self._phase = "epigraph";
            self._epiT = 0;
          });
        }
        driveDialogueUpdate(dt);
      } else if (this._phase === "epigraph") {
        this._epiT += dt;
        if (this._epiT > 6500) {
          this._phase = "done";
          if (G) G.chapter = 2;
          go("ch2_valley", { spawn: "from_aul" });
        }
      }
    },
    onKey: function (e) {
      if (!e) return;
      if (this._phase === "scene") { driveDialogueKey(e); return; }
      if (this._phase === "epigraph") {
        if (e.action === "confirm") {
          // allow skipping the held epigraph
          this._phase = "done";
          if (G) G.chapter = 2;
          cue("sfx_confirm");
          go("ch2_valley", { spawn: "from_aul" });
        }
      }
    },
    render: function (c) {
      var w = W(), h = H();
      // night by the fire
      backdrop(c, pal("night", "#0E0F1A"), pal("caveDark", "#171826"));
      // stars
      for (var i = 0; i < 50; i++) {
        var sx = (i * 71) % w, sy = (i * 37) % (h * 0.5);
        c.fillStyle = pal("bone", "#D8CFB8");
        c.save(); c.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin(this._t / 700 + i));
        c.fillRect(sx, sy, 2, 2); c.restore();
      }

      if (this._phase === "epigraph") {
        // the chapter epigraph (verbatim, DESIGN §ГЛАВА 1 closing)
        c.fillStyle = "#000000";
        c.save(); c.globalAlpha = clampL(this._epiT / 1200, 0, 0.92);
        c.fillRect(0, 0, w, h); c.restore();
        var a = clampL(this._epiT / 900, 0, 1);
        c.save(); c.globalAlpha = a;
        txt(c, "«Кюй — это не мелодия. Кюй — это слова, для которых нет слов.»",
          w / 2, h / 2 - 12, { color: pal("gold", "#D4A017"), size: 17, align: "center", maxWidth: w - 120 });
        txt(c, "— Нұрлан-бақсы",
          w / 2, h / 2 + 30, { color: pal("boneGrey", "#B8B4A4"), size: 14, align: "center" });
        c.restore();
        return;
      }

      // the fire
      var fx = w * 0.5, fy = h * 0.6;
      var flick = 0.7 + 0.3 * Math.abs(Math.sin(this._t / 110));
      if (!sprite(c, "campfire", Math.round(fx - 16), Math.round(fy - 8), 2, {})) {
        c.save(); c.globalAlpha = flick;
        c.fillStyle = pal("caveFire", "#E8B25A");
        try { c.beginPath(); c.moveTo(fx, fy - 20); c.lineTo(fx - 11, fy + 8); c.lineTo(fx + 11, fy + 8); c.closePath(); c.fill(); } catch (e) {}
        c.restore();

  /* heart of the burning ring. Talking to him -> ch2_nurlan.             */

    if (typeof World !== "undefined" && World && World.makeExploreScene) {
      base = World.makeExploreScene("valley_koblandy", {
        spawn: "from_aul",

          cue("theme_overworld");
          questStart("q_follow_tracks");
        },
        onRender: function (c) {
          // the grass burns without wind: drifting embers over the field
          var w = W(), hh = H();
          var t = (typeof Engine !== "undefined" && Engine.now) ? Engine.now : 0;
          c.save();
          for (var i = 0; i < 26; i++) {
            var ex = ((i * 97) + (t * 0.02)) % w;
            var ey = (hh - ((i * 53) + (t * 0.03)) % hh);
            c.globalAlpha = 0.25 + 0.25 * Math.abs(Math.sin(t / 300 + i));
            c.fillStyle = (i % 3 === 0) ? pal("feltRed", "#C0392B") : pal("caveFire", "#E8B25A");
            c.fillRect(ex, ey, 2, 2);
          }

          if (!dialogueActive()) {

          txt(c, "Z — подойти к старику", W() / 2, H() / 2 + 24, { color: pal("boneGrey", "#B8B4A4"), size: 14, align: "center" });
        },
        onKey: function (e) { if (e && e.action === "confirm") go("ch2_nurlan"); }

    Scenes.register("ch2_valley", base);
  })();

    blockPause: true,
    _started: false,
    _t: 0,
    _phase: "fight",   // "fight" (delegated to Battle) -> "crumble"

          this._startBattle();

        driveDialogueUpdate(dt);

      c.fillStyle = pal("caveStone", "#33354A");
      c.fillRect(0, h * 0.7, w, h * 0.3);

        txt(c, "Жалмауыз Кемпір", w / 2, h / 2 - 10, { color: pal("feltRed", "#C0392B"), size: 20, align: "center" });
        txt(c, "Играй на домбре — меч её не берёт.", w / 2, h / 2 + 20,

        return;

      // crumble: she dissolves into drifting dust as she laughs her line
      var cx = w * 0.5, cy = h * 0.42;

        var dxp = cx + Math.cos(ang) * rad;

            self._ghostT = 0;
          });

        driveDialogueUpdate(dt);

        if (this._ghostT > 5200) {

          // From this moment Нұрлан appears as a ghost (party/flag).
          setFlag("nurlanGhost", true);
          try {
            if (G) {
              if (!G.party) G.party = [];
              if (G.party.indexOf("nurlan_ghost") < 0) G.party.push("nurlan_ghost");
            }
          } catch (e) {}
          // set up Жер Асты for ch3
          setFlag("zherAstyOpen", true);
          if (G) G.chapter = 3;
          go("ch3_descent");
        }
      }
    },
    onKey: function (e) {
      if (this._phase === "death") { driveDialogueKey(e); return; }
      if (this._phase === "ghost") {
        if (e && e.action === "confirm" && this._ghostT > 2600) {
          this._phase = "done";
          setFlag("nurlanGhost", true);
          try {
            if (G) {
              if (!G.party) G.party = [];
              if (G.party.indexOf("nurlan_ghost") < 0) G.party.push("nurlan_ghost");
            }
          } catch (e2) {}
          setFlag("zherAstyOpen", true);
          if (G) G.chapter = 3;
          cue("sfx_confirm");
          go("ch3_descent");
        }
      }
    },
    render: function (c) {
      var w = W(), h = H();
      backdrop(c, pal("night", "#0E0F1A"), pal("caveDark", "#171826"));

      // the fire the children sit around
      var fx = w * 0.5, fy = h * 0.62;
      var flick = 0.7 + 0.3 * Math.abs(Math.sin(this._t / 120));
      if (!sprite(c, "campfire", Math.round(fx - 16), Math.round(fy - 8), 2, {})) {
        c.save(); c.globalAlpha = flick; c.fillStyle = pal("caveFire", "#E8B25A");
        try { c.beginPath(); c.moveTo(fx, fy - 18); c.lineTo(fx - 10, fy + 6); c.lineTo(fx + 10, fy + 6); c.closePath(); c.fill(); } catch (e) {}
        c.restore();
      }
      c.save(); c.globalAlpha = 0.2 * flick; c.fillStyle = pal("caveFire", "#E8B25A");
      try { c.beginPath(); c.arc(fx, fy, 80, 0, Math.PI * 2); c.fill(); } catch (e2) {}
      c.restore();

      // Нұрлан lying / seated by the fire (living until the ghost phase)

        if (!sprite(c, "nurlan", Math.round(fx - 70), Math.round(fy - 28), 3, {})) {
          c.fillStyle = pal("bone", "#D8CFB8");
          c.fillRect(fx - 62, fy - 22, 30, 38);

        c.fillStyle = pal("skyBlue", "#2980B9");
        c.fillRect(fx + 44, fy - 28, 22, 42);

      // the children gathered, weeping
      for (var k = 0; k < 4; k++) {
        var chx = fx - 40 + k * 26;
        var chy = fy + 18;
        if (!sprite(c, "child", Math.round(chx), Math.round(chy), 2, {})) {
          c.fillStyle = pal("yurtWhite", "#F5ECD7");
          c.fillRect(chx, chy, 11, 18);
        }
      }

      // the translucent ghost rises from behind the fire
      if (this._phase === "ghost") {
        var a = clampL(this._ghostT / 1500, 0, 0.7) * (0.7 + 0.3 * Math.abs(Math.sin(this._ghostT / 500)));
        var gx = fx - 18, gy = fy - 64 - clampL(this._ghostT / 60, 0, 30);
        c.save();
        c.globalAlpha = a;
        if (!sprite(c, "nurlan_ghost", Math.round(gx), Math.round(gy), 3, { alpha: a })) {
          c.fillStyle = pal("skyHigh", "#C7D6DE");
          c.fillRect(gx, gy, 30, 46);
          c.fillStyle = pal("yurtWhite", "#F5ECD7");
          c.fillRect(gx + 8, gy + 8, 4, 3);
          c.fillRect(gx + 18, gy + 8, 4, 3);
        }
        c.restore();
        // caption: he nods and vanishes
        if (this._ghostT > 2200) {
          c.save(); c.globalAlpha = clampL((this._ghostT - 2200) / 800, 0, 1);
          txt(c, "Нұрлан смотрит на Ержана. Кивает. И исчезает.",
            w / 2, h - 40, { color: pal("boneGrey", "#B8B4A4"), size: 14, align: "center", maxWidth: w - 120 });
          c.restore();
        }
      }

      driveDialogueRender(c);
    }
  });

})();

     ch3_descent   — Нұрлан-ghost reveals the new crack; descend.

     ch3_donen     — boss 3.2: Дөнен, dead colossal horse blocking the exit; melee passes
                     through; resolved by playing the father melody -> Дөнен sleeps;
                     Нұрлан-ghost verbatim lines; hands off to Chapter 4.
     ch4_ascent    — living mountain Хан Тәңірі; riddle-spirits (TEXT riddles) open the path.
     ch4_ayaulym   — scene 4.1: meet Аяулым at the cliff (verbatim).
     ch4_curse     — quest 4.2: find the 3 hidden objects (each a small story); spoken-aloud
                     confession lifts the curse; eagle Қара Сұңқар approaches.
     ch4_flight    — eagle-flight cutscene (world shrinks, dissolves to sky-white).
     ch4_tanir     — scene 4.3: Тәңір-Ана spinning the thread (verbatim) ending in the Сила

  // tiny deterministic star/fire field so backgrounds shimmer without state churn
  function flicker(seed, t) {
    // cheap pseudo-noise 0..1, time-animated
    var s = Math.sin((seed * 12.9898 + t * 0.003) ) * 43758.5453;
    return (s - Math.floor(s));
  }

  function drawCaveBackdrop(c, t) {
    var w = W(), h = H();
    c.fillStyle = PAL("caveDark", "#171826");
    c.fillRect(0, 0, w, h);
    // stone strata
    c.fillStyle = PAL("caveStone", "#33354A");
    for (var i = 0; i < 7; i++) {
      var yy = 40 + i * 84 + Math.sin(t * 0.0006 + i) * 6;
      c.globalAlpha = 0.18 + 0.05 * (i % 3);
      c.fillRect(0, yy, w, 30);
    }
    c.globalAlpha = 1;
    // pale cave fires
    for (var k = 0; k < 9; k++) {
      var fx = 60 + (k * 83) % (w - 80);
      var fy = 120 + ((k * 137) % (h - 200));
      var fl = flicker(k + 1, t);
      var r = 5 + fl * 4;
      c.globalAlpha = 0.35 + fl * 0.4;
      c.fillStyle = PAL("caveFire", "#E8B25A");
      c.beginPath(); c.arc(fx, fy, r, 0, Math.PI * 2); c.fill();
      c.globalAlpha = 0.12 + fl * 0.18;
      c.beginPath(); c.arc(fx, fy, r * 2.6, 0, Math.PI * 2); c.fill();
    }
    c.globalAlpha = 1;
  }

  function drawCrack(c, cx, cy, scale, t) {
    // a jagged violet-lit crack in the rock (the Tas Jurek crack light)
    scale = scale || 1;
    c.save();
    c.translate(cx, cy);
    var grad;
    try {
      grad = c.createLinearGradient(0, -60 * scale, 0, 60 * scale);
      grad.addColorStop(0, PAL("bloodDark", "#5A1E1A"));
      grad.addColorStop(0.5, PAL("crackLight", "#7A3CE0"));
      grad.addColorStop(1, PAL("bloodDark", "#5A1E1A"));
      c.fillStyle = grad;
    } catch (e) { c.fillStyle = PAL("crackLight", "#7A3CE0"); }
    c.beginPath();
    c.moveTo(-3 * scale, -62 * scale);
    c.lineTo(4 * scale, -30 * scale);
    c.lineTo(-2 * scale, -4 * scale);
    c.lineTo(6 * scale, 28 * scale);
    c.lineTo(-1 * scale, 60 * scale);
    c.lineTo(-7 * scale, 26 * scale);
    c.lineTo(-2 * scale, -2 * scale);
    c.lineTo(-9 * scale, -32 * scale);
    c.closePath();
    c.fill();
    // glow pulse
    var p = 0.4 + 0.3 * Math.sin(t * 0.004);
    c.globalAlpha = p;
    c.fillStyle = PAL("crackLight", "#7A3CE0");
    c.beginPath(); c.ellipse(0, 0, 16 * scale, 70 * scale, 0, 0, Math.PI * 2); c.fill();
    c.restore();
    c.globalAlpha = 1;
  }

  function drawSkyBackdrop(c, t) {
    var w = W(), h = H();
    // dawn gradient from sky-high to bright void
    var grad;
    try {
      grad = c.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, PAL("skyHigh", "#C7D6DE"));
      grad.addColorStop(0.55, PAL("skyWhite", "#EDEFE6"));
      grad.addColorStop(1, PAL("yurtWhite", "#F5ECD7"));
      c.fillStyle = grad;
    } catch (e) { c.fillStyle = PAL("skyWhite", "#EDEFE6"); }
    c.fillRect(0, 0, w, h);
    // distant peaks
    c.fillStyle = PAL("greySteppe", "#8A8A7A");
    c.globalAlpha = 0.5;
    c.beginPath();
    c.moveTo(0, h);
    var n = 8;
    for (var i = 0; i <= n; i++) {
      var px = i * (w / n);
      var py = h - 140 - Math.abs(Math.sin(i * 1.7 + 0.5)) * 110;
      c.lineTo(px, py);
    }
    c.lineTo(w, h); c.closePath(); c.fill();
    c.globalAlpha = 1;
    // a couple of slow flageolet "sparkles"
    for (var k = 0; k < 14; k++) {
      var sx = (k * 113 + Math.sin(t * 0.0005 + k) * 30) % w;
      var sy = 30 + (k * 51) % (h - 200);
      var fl = flicker(k + 7, t);
      c.globalAlpha = 0.15 + fl * 0.4;
      c.fillStyle = PAL("yurtWhite", "#F5ECD7");
      c.fillRect(sx, sy, 2, 2);
    }
    c.globalAlpha = 1;
  }

  function drawMountainBackdrop(c, t) {
    var w = W(), h = H();
    var grad;
    try {
      grad = c.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, PAL("skyHigh", "#C7D6DE"));
      grad.addColorStop(0.5, PAL("skyBlue", "#2980B9"));
      grad.addColorStop(1, PAL("caveStone", "#33354A"));
      c.fillStyle = grad;
    } catch (e) { c.fillStyle = PAL("skyBlue", "#2980B9"); }
    c.fillRect(0, 0, w, h);
    // wind streaks
    c.strokeStyle = PAL("yurtWhite", "#F5ECD7");
    c.globalAlpha = 0.10;
    c.lineWidth = 2;
    for (var i = 0; i < 10; i++) {
      var yy = (i * 67 + t * 0.05) % h;
      c.beginPath();
      c.moveTo(0, yy);
      c.lineTo(w, yy - 40);
      c.stroke();
    }
    c.globalAlpha = 1;
  }

  /* a simple centered cinematic frame: backdrop fn + a portrait sprite + caption box */
  function drawNarrationFrame(c, opts) {
    opts = opts || {};
    if (typeof opts.backdrop === "function") { try { opts.backdrop(c, opts.t || 0); } catch (e) {} }
    // a faint vignette
    c.save();
    c.globalAlpha = 0.25;
    c.fillStyle = "#000000";
    c.fillRect(0, 0, W(), 60);
    c.fillRect(0, H() - 70, W(), 70);
    c.restore();
  }

  // open a gate tile in the active mountain map (rock -> walkable grass_grey)
  function openGate(gx, gy) {
    try {
      var loc = (typeof World !== "undefined" && World.get) ? World.get("han_tanir_slope") : null;
      if (loc && Array.isArray(loc.grid)) {
        var row = loc.grid[gy];
        if (typeof row === "string") {
          loc.grid[gy] = row.substring(0, gx) + "." + row.substring(gx + 1);
        }
        // if the map is currently loaded, reload it in place so the cleared tile
        // takes effect (preserve player position by using a temp spawn at player tile)
        if (typeof World.active === "function" && World.active() && World.active().id === "han_tanir_slope") {
          var px = (World.player && typeof World.player.x === "number") ? World.player.x : 2;
          var py = (World.player && typeof World.player.y === "number") ? World.player.y : 17;
          loc.spawns = loc.spawns || {};
          loc.spawns["__resume__"] = { x: px, y: py, dir: (World.player && World.player.dir) || "up" };
          if (World.load) World.load("han_tanir_slope", "__resume__");
        }
      }
    } catch (e) {}
  }

  Scenes.register("ch3_father", {
    _t: 0, _phase: "intro", _learned: false,
    enter: function () {
      this._t = 0; this._phase = "intro"; this._learned = false;
      cue("theme_zher_asty");
      var self = this;
      // begin the confession after a short beat
      this._kick = 600;
    },
    update: function (dt) {
      this._t += dt;
      if (this._kick > 0) {
        this._kick -= dt;
        if (this._kick <= 0 && this._phase === "intro") {
          this._phase = "talk";
          var self = this;
          startDialogue(TREE_ch3_father, function () { self._beginLearning(); });
        }
      }
      if (blockWorldInput()) { dlgUpdate(dt); }
    },
    _beginLearning: function () {
      this._phase = "learn";
      var self = this;
      // play the unfinished kui then ask the player to repeat the 8 notes
      cue("kui_erzhan_unfinished");
      if (typeof Rhythm !== "undefined" && Rhythm.start) {
        try {
          Rhythm.start({
            melody: FATHER_MELODY,
            bpm: 84,
            onResult: function (acc) { self._afterLearning(acc); }
          });
          return;
        } catch (e) {}
      }
      // Rhythm missing -> still grant the passage so the story can proceed
      self._afterLearning(100);
    },
    _afterLearning: function (acc) {
      this._phase = "done";
      this._learned = true;
      // reaching the father's passage sets the kui to at least 1 (CONTRACT §2)
      if (typeof G !== "undefined" && G) {
        var cur = (typeof G.dombraMelodyLearned === "number") ? G.dombraMelodyLearned : 0;
        G.dombraMelodyLearned = clampN(Math.max(cur, 1), 0, 3);
        if (!G.flags) G.flags = {};
        G.flags["learnedFatherMelody"] = true;
      }
      cue("sfx_confirm");
      var self = this;
      // a short verbatim-respecting beat acknowledging the learned notes, then boss

  /* ch4_flight — eagle-flight CUTSCENE: the pixel world below shrinks, then
     dissolves to sky-white. Uses Cutscene if present (owned by 70-ui.js, loaded
     after this file — guarded). Falls back to a self-driven animation otherwise. */
  Scenes.register("ch4_flight", {
    _t: 0, _started: false, _zoom: 1, _white: 0,
    blockPause: true,
    enter: function () {
      this._t = 0; this._started = false; this._zoom = 1; this._white = 0;
      // mark curse done / heal nothing here (region heals on world progress); join later
      questComplete("curse_ayaulym");
      cue("sfx_eagle_cry");
      var self = this;
      // Prefer the Cutscene API for the canonical cinematic timeline
      if (typeof Cutscene !== "undefined" && Cutscene && Cutscene.play) {
        this._usingCutscene = true;
        var timeline = [
          { at: 0, cue: "theme_aspan" },
          { at: 0, text: "Қара Сұңқар расправляет крылья." },
          { at: 200, cue: "sfx_eagle_cry" },
          { at: 300, do: function (c) { self._drawFlight(c, self._cutT()); } },
          { at: 1600, text: "Пиксельный мир снизу становится маленьким." },
          { at: 3400, text: "Потом исчезает совсем." },
          { at: 5200, text: "Белая бесконечность." },
          { at: 7200, text: "" },
          { at: 8000 }
        ];
        try {
          Cutscene.play(timeline, function () { go("ch4_tanir"); });
          return;
        } catch (e) { this._usingCutscene = false; }
      }
      // self-driven fallback animation
      this._usingCutscene = false;
      this._started = true;
    },
    _cutT: function () { return this._t; },
    update: function (dt) {
      this._t += dt;
      if (this._usingCutscene) return; // Cutscene overlay drives visuals + ending
      // fallback timeline: zoom out for 4.5s, then whiteout for 2s, then continue
      if (this._t < 4500) {
        this._zoom = lerpN(1.0, 0.12, clampN(this._t / 4500, 0, 1));
      } else {
        this._zoom = 0.12;
        this._white = clampN((this._t - 4500) / 2000, 0, 1);
        if (this._t > 7000) {
          go("ch4_tanir");
        }
      }
    },
    _drawFlight: function (c, t) {
      // shared painter for both Cutscene `do` beats and the fallback render
      drawSkyBackdrop(c, t);
      // the shrinking pixel-world below (a little tiled patch that scales down)
      var z = this._usingCutscene
        ? clampN(1 - (t - 300) / 5000, 0.1, 1) // mirror the cutscene zoom over ~5s
        : this._zoom;
      var cw = W(), ch = H();
      var pw = 360 * z, ph = 240 * z;
      var ox = cw / 2 - pw / 2;
      var oy = ch * 0.62 - ph / 2 + (1 - z) * 120;
      c.save();
      c.globalAlpha = clampN(z * 1.1, 0, 1);
      // miniature steppe patch
      var cols = 9, rows = 6;
      for (var yy = 0; yy < rows; yy++) {
        for (var xx = 0; xx < cols; xx++) {
          var alive = ((xx + yy) % 3 !== 0);
          c.fillStyle = alive ? PAL("grassDark", "#4E7A33") : PAL("greySteppe", "#8A8A7A");
          c.fillRect(ox + xx * (pw / cols), oy + yy * (ph / rows),
                     Math.ceil(pw / cols), Math.ceil(ph / rows));
        }
      }
      // a tiny river
      c.fillStyle = PAL("waterLight", "#3E86A8");
      c.fillRect(ox + pw * 0.3, oy, Math.max(2, pw * 0.06), ph);
      c.restore();
      // the eagle, large, foreground, gently bobbing
      var bob = Math.sin(t * 0.004) * 8;
      var eDrew = spriteSafe(c, "eagle_fly", cw / 2 - 48, ch * 0.30 + bob, 8, {});
      if (!eDrew) eDrew = spriteSafe(c, "eagle", cw / 2 - 48, ch * 0.30 + bob, 8, {});
      if (!eDrew) {
        c.fillStyle = PAL("earth", "#7D4E2A");
        c.fillRect(cw / 2 - 60, ch * 0.30 + bob, 120, 40);
        c.fillStyle = PAL("outline", "#1A0A00");
        c.fillRect(cw / 2 - 90, ch * 0.30 + bob + 14, 180, 6);
      }
    },
    render: function (c) {
      if (this._usingCutscene) {
        // Cutscene overlay handles its own drawing; render a clean sky base beneath
        drawSkyBackdrop(c, this._t);
        return;
      }
      this._drawFlight(c, this._t);
      // whiteout
      if (this._white > 0) {
        c.fillStyle = "rgba(237,239,230," + this._white.toFixed(3) + ")";
        c.fillRect(0, 0, W(), H());
      }
      // captions for the fallback path
      var cap = "";
      if (this._t < 1600) cap = "Қара Сұңқар расправляет крылья.";
      else if (this._t < 3400) cap = "Пиксельный мир снизу становится маленьким.";
      else if (this._t < 4500) cap = "Потом исчезает совсем.";
      else cap = "Белая бесконечность.";
      txt(c, cap, W() / 2, H() - 40, { color: PAL("skyBlue", "#2980B9"), size: 14, align: "center" });
    },
    onKey: function (e) {
      // allow confirm to skip the fallback; Cutscene handles its own fast-forward
      if (!this._usingCutscene && e && e.action === "confirm" && this._t > 1000) {
        go("ch4_tanir");
      }
    }
  });

  Scenes.register("ch4_tanir", {

    render: function (c) {
      // pure sky-white world (the Upper world); Тәңір-Ана seated, spinning
      var w = W(), h = H();
      c.fillStyle = PAL("skyWhite", "#EDEFE6");
      c.fillRect(0, 0, w, h);
      // very soft horizon glow
      c.save();
      c.globalAlpha = 0.4;
      var g;
      try {
        g = c.createRadialGradient(w / 2, h / 2, 40, w / 2, h / 2, h);
        g.addColorStop(0, PAL("yurtWhite", "#F5ECD7"));
        g.addColorStop(1, PAL("skyWhite", "#EDEFE6"));
        c.fillStyle = g;
        c.fillRect(0, 0, w, h);
      } catch (e) {}
      c.restore();
      // the thread descending into the steppe below
      c.strokeStyle = PAL("gold", "#D4A017");
      c.globalAlpha = 0.7;
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(w / 2 + 6, h / 2 + 10);
      var wob = Math.sin(this._t * 0.002) * 6;
      c.bezierCurveTo(w / 2 + 30 + wob, h * 0.7, w / 2 - 20 + wob, h * 0.85, w / 2 + 10, h);
      c.stroke();
      c.globalAlpha = 1;
      // Тәңір-Ана (mother sprite), seated
      var drew = spriteSafe(c, "mother", w / 2 - 30, h / 2 - 60, 6, {});
      if (!drew) {
        c.fillStyle = PAL("boneGrey", "#B8B4A4");
        c.fillRect(w / 2 - 26, h / 2 - 40, 52, 70);
        c.fillStyle = PAL("yurtWhite", "#F5ECD7");
        c.fillRect(w / 2 - 18, h / 2 - 58, 36, 24); // head/scarf
      }
      drawNarrationFrame(c, { backdrop: null });
      txt(c, "ТӘҢІР-АНА", w / 2, 44, { color: PAL("gold", "#D4A017"), size: 18, align: "center" });
      if (!this._started) {
        txt(c, "Она прядёт нить. Нить уходит вниз — в степь.", w / 2, h - 36,
            { color: PAL("greySteppe", "#8A8A7A"), size: 13, align: "center" });
      }
      dlgRender(c);
    },
    onKey: function (e) {
      if (blockWorldInput()) { dlgKey(e); return; }
    }
  });

  /* ================================================================== */
  /* Defensive fallback scene factory (used only if World is unavailable)  */

  function fallbackRoomScene(title, nextId) {
    return {

      update: function (dt) { this._t += dt; if (blockWorldInput()) dlgUpdate(dt); },
      render: function (c) {

      onKey: function (e) {
        if (blockWorldInput()) { dlgKey(e); return; }
        if (e && e.action === "confirm") { go(nextId); }
      }
    };
  }

      { at: 11600, text: "Степь зеленеет. Жузы возвращаются домой." },
      { at: 15600, cue: "sfx_eagle_cry" },
      { at: 15600, text: "Аяулым улетает с орлом. Мать думает, что сын вернётся." },
      { at: 20000, text: "Эпилог: проходят годы." },
      { at: 23000, text: "Новый молодой пастух приходит к Ордо. Видит старика у огня — Ержана." },
      { at: 28000, text: "И старик говорит:" },
      { at: 30400, text: "«Садись. Чай будешь?»" },

      { at: 36600, text: "" },
      { at: 37400 }
    ];
  }, {
    bg: function (c, t) {
      // young shepherd arrives to a fire-lit yurt; warm but lonely
      _bgFireYurt(c, t);
    },
    onDone: function () { _markCompleted(); _setScene("title"); }
  }));

  /* ---- HIDDEN 4th ENDING (New Game+) — DESIGN §4.6 verbatim ---- */
  /* "Ержан и Серік вместе выходят к степи. Серік умирает под открытым небом.
     Степь зеленеет в тот же момент. Ержан возвращается домой." */
  _registerScene("ch8_ending_d", _makeEndingScene(function () {
    return [
      { at: 0, cue: "theme_aspan" },
      { at: 0, text: "Скрытая концовка." },
      { at: 2400, text: "Ержан и Серік вместе выходят к степи." },
      { at: 6000, text: "Серік умирает под открытым небом." },
      { at: 9800, cue: "sfx_heal" },
      { at: 9800, text: "Степь зеленеет в тот же момент." },
      { at: 13800, text: "Ержан возвращается домой." },
      { at: 17600, text: "«Степь — это не земля. Степь — это то, что мы помним о земле. Пока помним — она живёт.»" },
      { at: 22600, text: "— Серік Байұлы" },
      { at: 25600, text: "" },
      { at: 26400 }
    ];
  }, {
    bg: function (c, t) {
      _bgGreenSteppe(c, t);
      // a wide bright sky band — the open heaven Серік finally stands under
      var w = _W(), h = _H();
      c.fillStyle = "rgba(237,239,230,0.18)";
      c.fillRect(0, 0, w, h * 0.35);
    },
    onDone: function () { _markCompleted(); _setScene("title"); }
  }));

  /* ---- explicit New Game+ entry scene (optional hook for the title/menu) ---
     If anything wants to re-enter the throne knowing it's a second run, it can
     setScene("ch8_newgameplus"); this simply forwards to the throne (the Серік
     tree there auto-switches to the NG+ recognition variant). */
  _registerScene("ch8_newgameplus", {
    blockPause: false,
    enter: function () {
      if (G) {
        if (!G.flags) G.flags = {};
        G.flags.completedOnce = true; // ensure NG+ variant triggers
        G.chapter = 7;
      }
      _setScene("ch7_throne");
    },
    render: function (c) {
      c.fillStyle = _pal("night", "#0E0F1A");
      c.fillRect(0, 0, _W(), _H());
      _text(c, "ЖАҢА ОЙЫН+ / NEW GAME+", _W() / 2, _H() / 2,
        { color: _pal("gold", "#D4A017"), size: 22, align: "center" });
    }
  });

})();
