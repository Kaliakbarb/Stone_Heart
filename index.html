<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ТАС ЖҮРЕК — Stone Heart</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230E0F1A'/><path d='M8 3l4 3v4l-4 3-4-3V6z' fill='%23C8960C'/></svg>">
<style>
  html, body { margin: 0; height: 100%; background: #0E0F1A; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  #game {
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #0E0F1A; box-shadow: 0 0 60px rgba(0,0,0,0.9);
    max-width: 100vw; max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
"use strict";

/* ============================================================ */
/* ===== 00-engine.js (768 lines) ===== */
/* ============================================================ */
/* =====================================================================
   ТАС ЖҮРЕК / STONE HEART — 00-engine.js  (ENGINE SPINE)
   Owns: G, PALETTE, Input, Scenes, setScene, EventBus, Save, Engine,
         the rAF loop, gameTime accumulation, fade transition, pause-menu
         shell, global helpers, and a built-in fallback title + boot.
   RAW JS — concatenated first inside the single <script> of index.html.
   Self-sufficient: boots and runs alone with no other modules present.
   ===================================================================== */

/* ---------- global math / util helpers (exposed for all modules) ----- */
function clamp(v, min, max) { return v < min ? min : (v > max ? max : v); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rint(n) { return n | 0; }

/* parse "#rrggbb" -> [r,g,b]; tolerant of missing # / short input */
function _hexToRgb(hex) {
  if (typeof hex !== "string") return [255, 0, 255];
  var h = hex.charAt(0) === "#" ? hex.slice(1) : hex;
  if (h.length === 3) { h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2]; }
  if (h.length < 6) { return [255, 0, 255]; }
  var r = parseInt(h.slice(0, 2), 16);
  var g = parseInt(h.slice(2, 4), 16);
  var b = parseInt(h.slice(4, 6), 16);
  if (isNaN(r) || isNaN(g) || isNaN(b)) return [255, 0, 255];
  return [r, g, b];
}
function _rgbToHex(r, g, b) {
  function c(x) { x = clamp(rint(x), 0, 255).toString(16); return x.length === 1 ? "0" + x : x; }
  return "#" + c(r) + c(g) + c(b);
}
/* lerp between two hex colors -> "#rrggbb". Used by Sprites tint + World decay. */
function lerpColor(hexA, hexB, t) {
  t = clamp(t, 0, 1);
  var a = _hexToRgb(hexA), b = _hexToRgb(hexB);
  return _rgbToHex(lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t));
}

/* ---------- PALETTE (owned here) ------------------------------------- */
var PALETTE = {
  // core steppe / DESIGN.md §6.5 exact
  gold:        "#D4A017",
  goldAccent:  "#C8960C",
  feltRed:     "#C0392B",
  skyBlue:     "#2980B9",
  earth:       "#7D4E2A",
  yurtWhite:   "#F5ECD7",
  outline:     "#1A0A00",
  greySteppe:  "#8A8A7A",
  // living greens
  grassLight:  "#7CA646",
  grassDark:   "#4E7A33",
  leaf:        "#3E5F2A",
  // dying greys
  ashGrey:     "#9A9A8C",
  deadGreen:   "#6E7059",
  boneGrey:    "#B8B4A4",
  // water / sky
  waterDeep:   "#1F5E7A",
  waterLight:  "#3E86A8",
  skyWhite:    "#EDEFE6",
  skyHigh:     "#C7D6DE",
  // night / lower world
  night:       "#0E0F1A",
  caveDark:    "#171826",
  caveFire:    "#E8B25A",
  caveStone:   "#33354A",
  // accents / cracks
  bloodDark:   "#5A1E1A",
  crackLight:  "#7A3CE0",
  bone:        "#D8CFB8",
  shadow:      "#222018"
};

/* ---------- EventBus (owned here) ------------------------------------ */
var EventBus = (function () {
  var map = {};
  return {
    on: function (evt, fn) {
      if (!map[evt]) map[evt] = [];
      map[evt].push(fn);
      var self = this;
      return function () { self.off(evt, fn); };
    },
    off: function (evt, fn) {
      var arr = map[evt]; if (!arr) return;
      var i = arr.indexOf(fn); if (i >= 0) arr.splice(i, 1);
    },
    emit: function (evt, payload) {
      var arr = map[evt]; if (!arr) return;
      for (var i = 0; i < arr.length; i++) {
        try { arr[i](payload); } catch (e) { /* listener errors never break the loop */ }
      }
    }
  };
})();

/* ---------- GLOBAL STATE G (owned here) ------------------------------ */
/* G is created from Save.defaults() during boot, but we initialize a live
   object now so any top-level data references resolve; boot resets it. */
var G;  /* assigned below after Save is defined */

/* ---------- SAVE / LOAD (owned here) --------------------------------- */
var Save = (function () {
  var BASE = "tas_zhurek_save";
  function key(slot) { return BASE + "_" + (slot || 1); }

  function defaults() {
    return {
      chapter: 1,
      sceneId: "boot",
      flags: {},
      inventory: ["dombra"],
      party: ["erzhan"],
      dombraMelodyLearned: 0,
      worldDecay: {},
      killCount: 0,
      memories: [],
      quests: {},
      coalition: { dosan: false, marat: false, erlan: false },
      ayaulymTrust: 0,
      ayaulymLeft: false,
      serikPath: "neutral",
      settings: { musicVol: 0.6, sfxVol: 0.8, textSpeed: 30 },
      saveSlot: 1,
      gameTimeMs: 0
    };
  }

  /* deep-ish merge of saved object over a fresh defaults() so new fields
     added later never read as undefined for old saves */
  function mergeOverDefaults(saved) {
    var base = defaults();
    if (!saved || typeof saved !== "object") return base;
    for (var k in base) {
      if (!Object.prototype.hasOwnProperty.call(base, k)) continue;
      if (saved[k] === undefined) continue;
      var bv = base[k], sv = saved[k];
      if (bv && typeof bv === "object" && !Array.isArray(bv) &&
          sv && typeof sv === "object" && !Array.isArray(sv)) {
        for (var kk in bv) {
          if (sv[kk] !== undefined) base[k][kk] = sv[kk];
        }
        // also copy any extra keys the save had (e.g. extra flags/quests)
        for (var k2 in sv) { base[k][k2] = sv[k2]; }
      } else {
        base[k] = sv;
      }
    }
    return base;
  }

  function lsAvailable() {
    try {
      var t = "__tz_test__";
      window.localStorage.setItem(t, "1");
      window.localStorage.removeItem(t);
      return true;
    } catch (e) { return false; }
  }

  return {
    defaults: defaults,
    exists: function (slot) {
      if (!lsAvailable()) return false;
      try { return window.localStorage.getItem(key(slot)) != null; }
      catch (e) { return false; }
    },
    write: function (slot) {
      slot = slot || (G && G.saveSlot) || 1;
      if (!lsAvailable()) return false;
      try {
        var data = JSON.stringify(G);
        window.localStorage.setItem(key(slot), data);
        return true;
      } catch (e) { return false; }
    },
    read: function (slot) {
      slot = slot || 1;
      if (!lsAvailable()) return null;
      try {
        var raw = window.localStorage.getItem(key(slot));
        if (raw == null) return null;
        return mergeOverDefaults(JSON.parse(raw));
      } catch (e) { return null; }
    },
    clear: function (slot) {
      if (!lsAvailable()) return;
      try { window.localStorage.removeItem(key(slot)); } catch (e) {}
    },
    /* load a slot INTO the live G object (keeps reference stable) */
    loadInto: function (slot) {
      var data = this.read(slot);
      if (!data) return false;
      replaceG(data);
      return true;
    },
    newGame: function (slot) {
      var d = defaults();
      if (slot) d.saveSlot = slot;
      replaceG(d);
      if (typeof setScene === "function") setScene("ch1_intro");
      return true;
    }
  };
})();

/* replace all fields of the live G with those of `src` (reference stable) */
function replaceG(src) {
  if (!G) { G = src; return; }
  for (var k in G) { if (Object.prototype.hasOwnProperty.call(G, k)) delete G[k]; }
  for (var k2 in src) { if (Object.prototype.hasOwnProperty.call(src, k2)) G[k2] = src[k2]; }
}

/* initialize live G now */
G = Save.defaults();

/* ---------- ENGINE core object --------------------------------------- */
var Engine = {
  W: 800,
  H: 600,
  paused: false,
  now: 0,
  _started: false,
  /* fade primitive: fade screen toward/away from black.
     toBlack:true -> cover with black; false -> reveal. cb fires at midpoint/end. */
  fade: function (toBlack, ms, cb) {
    _fade.active = true;
    _fade.dir = toBlack ? 1 : -1;
    _fade.dur = (ms == null ? 250 : ms);
    _fade.t = 0;
    _fade.cb = (typeof cb === "function") ? cb : null;
    if (!toBlack && _fade.alpha === 0) _fade.alpha = 1; // ensure visible reveal start
  }
};

/* internal fade state */
var _fade = { active: false, alpha: 0, dir: 0, t: 0, dur: 250, cb: null };

/* ---------- canvas / ctx (created or grabbed on boot) ---------------- */
var canvas = null;
var ctx = null;

function _ensureCanvas() {
  canvas = document.getElementById("game");
  if (!canvas) {
    canvas = document.createElement("canvas");
    canvas.id = "game";
    if (document.body) document.body.appendChild(canvas);
  }
  canvas.width = Engine.W;
  canvas.height = Engine.H;
  // crisp pixel scaling in CSS
  canvas.style.imageRendering = "pixelated";
  canvas.style.display = "block";
  ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
}

/* ---------- pixel-text helper (exposed) ------------------------------ */
function drawText(c, str, x, y, opts) {
  opts = opts || {};
  var size = opts.size || 16;
  var font = opts.font || ('700 ' + size + 'px "Courier New", monospace');
  c.save();
  c.font = font;
  c.textAlign = opts.align || "left";
  c.textBaseline = opts.baseline || "alphabetic";
  if (opts.maxWidth) {
    // simple word-wrap into lines
    var words = String(str).split(" ");
    var line = "", lines = [], i;
    for (i = 0; i < words.length; i++) {
      var test = line ? (line + " " + words[i]) : words[i];
      if (c.measureText(test).width > opts.maxWidth && line) {
        lines.push(line); line = words[i];
      } else { line = test; }
    }
    if (line) lines.push(line);
    var lh = opts.lineHeight || (size + 4);
    for (i = 0; i < lines.length; i++) {
      _emitText(c, lines[i], x, y + i * lh, opts);
    }
  } else {
    _emitText(c, String(str), x, y, opts);
  }
  c.restore();
}
function _emitText(c, str, x, y, opts) {
  if (opts.shadow !== false) {
    c.fillStyle = opts.shadowColor || PALETTE.outline;
    c.fillText(str, x + 2, y + 2);
  }
  c.fillStyle = opts.color || PALETTE.yurtWhite;
  c.fillText(str, x, y);
}

/* ===================================================================== */
/* SCENES registry + setScene                                            */
/* ===================================================================== */
var Scenes = (function () {
  var registry = {};
  return {
    _registry: registry,
    register: function (id, obj) {
      registry[id] = obj || {};
      return registry[id];
    },
    get: function (id) { return registry[id]; },
    has: function (id) { return !!registry[id]; },
    current: null,
    currentId: null
  };
})();

/* fallback scene factory for unknown ids — never throws */
function _makeFallbackScene(id) {
  return {
    _id: id,
    render: function (c) {
      c.fillStyle = "#000000";
      c.fillRect(0, 0, Engine.W, Engine.H);
      drawText(c, "СЦЕНА НЕ НАЙДЕНА: " + id, Engine.W / 2, Engine.H / 2 - 10,
        { color: PALETTE.gold, size: 22, align: "center" });
      drawText(c, "Z — на главную", Engine.W / 2, Engine.H / 2 + 26,
        { color: PALETTE.boneGrey, size: 14, align: "center" });
    },
    onKey: function (e) {
      if (e && e.action === "confirm") {
        if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("sfx_confirm");
        setScene("title");
      }
    }
  };
}

/* setScene with fade transition. Queues the latest target during a fade.
   Optional `instant` (3rd arg) commits immediately with only a fade-IN — used by
   boot for the very first scene so a throttled first frame can never strand the
   player on the black boot screen. Normal gameplay transitions omit it (fade out+in). */
var _sceneSwap = { pending: null, mid: false };

function setScene(id, params, instant) {
  params = params || {};
  _sceneSwap.pending = { id: id, params: params };
  if (instant) {
    // commit now (no fade-out), then a short fade-in reveal
    _sceneSwap.mid = true;
    _commitPendingScene();
    _sceneSwap.mid = false;
    Engine.fade(false, 200, null);
    return;
  }
  // queue if currently mid-fade-out for another scene
  if (_fade.active && _fade.dir === 1 && _sceneSwap.mid) {
    // a fade-out is already running; the new target will be picked up at midpoint
    return;
  }
  _beginSceneFadeOut();
}

function _beginSceneFadeOut() {
  _sceneSwap.mid = false;
  Engine.fade(true, 220, function () {
    _sceneSwap.mid = true;
    _commitPendingScene();
    // fade back in
    Engine.fade(false, 220, function () {
      _sceneSwap.mid = false;
    });
  });
}

function _commitPendingScene() {
  var target = _sceneSwap.pending;
  if (!target) return;
  _sceneSwap.pending = null;

  var old = Scenes.current;
  var oldId = Scenes.currentId;
  if (old && typeof old.exit === "function") {
    try { old.exit(); } catch (e) {}
  }
  EventBus.emit("scene:exit", { id: oldId });

  var next = Scenes.get(target.id);
  if (!next) next = _makeFallbackScene(target.id);

  Scenes.current = next;
  Scenes.currentId = target.id;
  G.sceneId = target.id;
  Engine.paused = false;       // never carry pause across scenes
  _pause.open = false;

  if (typeof next.enter === "function") {
    try { next.enter(target.params || {}); } catch (e) {}
  }
  EventBus.emit("scene:enter", { id: target.id, params: target.params });
}

/* ===================================================================== */
/* INPUT                                                                 */
/* ===================================================================== */
var Input = (function () {
  var keys = {};        // currently-held semantic actions
  var pressedThisFrame = {}; // edge: true the frame it went down
  var bound = false;

  function actionFor(e) {
    var k = e.key;
    var code = e.code;
    // normalize
    if (k === "ArrowUp" || code === "KeyW" || k === "w" || k === "W" || k === "ц" || k === "Ц") return "up";
    if (k === "ArrowDown" || code === "KeyS" || k === "s" || k === "S" || k === "ы" || k === "Ы") return "down";
    if (k === "ArrowLeft" || code === "KeyA" || k === "a" || k === "A" || k === "ф" || k === "Ф") return "left";
    if (k === "ArrowRight" || code === "KeyD" || k === "d" || k === "D" || k === "в" || k === "В") return "right";
    if (k === "Enter" || code === "KeyZ" || k === "z" || k === "Z" || k === "я" || k === "Я") return "confirm";
    if (k === "Escape" || code === "KeyX" || k === "x" || k === "X" || k === "ч" || k === "Ч") return "cancel";
    if (k === " " || code === "Space" || k === "Spacebar") return "dombra";
    if (k === "1" || code === "Digit1") return "choice1";
    if (k === "2" || code === "Digit2") return "choice2";
    if (k === "3" || code === "Digit3") return "choice3";
    if (k === "4" || code === "Digit4") return "choice4";
    return undefined;
  }

  function onKeyDown(e) {
    // first user gesture -> resume audio
    if (typeof Audio !== "undefined" && Audio.resume) { try { Audio.resume(); } catch (x) {} }

    var action = actionFor(e);
    e.action = action;
    if (action) {
      // prevent page scroll on arrows/space
      if (action === "up" || action === "down" || action === "left" ||
          action === "right" || action === "dombra") {
        if (e.preventDefault) e.preventDefault();
      }
      if (!keys[action]) pressedThisFrame[action] = true;
      keys[action] = true;
    }

    // ENGINE intercepts cancel/Esc for the pause menu FIRST (unless blocked)
    var scene = Scenes.current;
    var blockPause = scene && scene.blockPause === true;
    if (action === "cancel" && !blockPause) {
      _togglePause();
      return; // consumed by engine
    }
    // if pause menu is open, it handles navigation
    if (_pause.open) {
      _pauseOnKey(e);
      return;
    }
    // dispatch to active scene
    if (scene && typeof scene.onKey === "function") {
      try { scene.onKey(e); } catch (x) {}
    }
  }

  function onKeyUp(e) {
    var action = actionFor(e);
    if (action) { keys[action] = false; }
  }

  function onClick(e) {
    if (typeof Audio !== "undefined" && Audio.resume) { try { Audio.resume(); } catch (x) {} }
    var rect = canvas.getBoundingClientRect();
    var sx = Engine.W / rect.width;
    var sy = Engine.H / rect.height;
    var x = (e.clientX - rect.left) * sx;
    var y = (e.clientY - rect.top) * sy;
    if (_pause.open) { _pauseOnClick(x, y); return; }
    var scene = Scenes.current;
    if (scene && typeof scene.onClick === "function") {
      try { scene.onClick(x, y); } catch (xx) {}
    }
  }

  return {
    keys: keys,
    pressed: function (action) { return !!pressedThisFrame[action]; },
    _clearFrame: function () { for (var k in pressedThisFrame) pressedThisFrame[k] = false; },
    bind: function () {
      if (bound) return;
      bound = true;
      window.addEventListener("keydown", onKeyDown, false);
      window.addEventListener("keyup", onKeyUp, false);
      if (canvas) canvas.addEventListener("click", onClick, false);
      // safety: clear held keys when window loses focus
      window.addEventListener("blur", function () {
        for (var k in keys) keys[k] = false;
      }, false);
    }
  };
})();

/* ===================================================================== */
/* PAUSE MENU SHELL                                                      */
/* ===================================================================== */
var _pause = { open: false, idx: 0, items: ["Продолжить", "Сохранить", "Загрузить", "На главную"] };

function _togglePause() {
  _pause.open = !_pause.open;
  Engine.paused = _pause.open;
  _pause.idx = 0;
  if (typeof Audio !== "undefined" && Audio.playCue) {
    Audio.playCue(_pause.open ? "sfx_cancel" : "sfx_confirm");
  }
}

function _pauseOnKey(e) {
  var a = e.action;
  if (a === "up") {
    _pause.idx = (_pause.idx + _pause.items.length - 1) % _pause.items.length;
    if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("sfx_select");
  } else if (a === "down") {
    _pause.idx = (_pause.idx + 1) % _pause.items.length;
    if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("sfx_select");
  } else if (a === "cancel") {
    _togglePause();
  } else if (a === "confirm" || a === "choice1" || a === "choice2" ||
             a === "choice3" || a === "choice4") {
    var pick = _pause.idx;
    if (a === "choice1") pick = 0; else if (a === "choice2") pick = 1;
    else if (a === "choice3") pick = 2; else if (a === "choice4") pick = 3;
    _pauseSelect(pick);
  }
}

function _pauseOnClick(x, y) {
  // hit-test the menu rows
  var startY = Engine.H / 2 - 40;
  for (var i = 0; i < _pause.items.length; i++) {
    var ry = startY + i * 34;
    if (x > Engine.W / 2 - 120 && x < Engine.W / 2 + 120 && y > ry - 18 && y < ry + 10) {
      _pauseSelect(i);
      return;
    }
  }
}

function _pauseSelect(i) {
  if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("sfx_confirm");
  if (i === 0) {                       // Продолжить
    _togglePause();
  } else if (i === 1) {                // Сохранить
    Save.write(G.saveSlot || 1);
    _pause._flash = "Сохранено";
    _pause._flashT = 1200;
  } else if (i === 2) {                // Загрузить
    if (Save.exists(G.saveSlot || 1)) {
      Save.loadInto(G.saveSlot || 1);
      _pause.open = false; Engine.paused = false;
      setScene(G.sceneId || "ch1_intro");
    } else {
      _pause._flash = "Нет сохранения";
      _pause._flashT = 1200;
    }
  } else if (i === 3) {                // На главную
    _pause.open = false; Engine.paused = false;
    if (typeof Audio !== "undefined" && Audio.stopMusic) Audio.stopMusic();
    setScene("title");
  }
}

function _renderPause(c) {
  // dim
  c.fillStyle = "rgba(8,8,12,0.78)";
  c.fillRect(0, 0, Engine.W, Engine.H);
  // panel
  var pw = 300, ph = 230;
  var px = (Engine.W - pw) / 2, py = (Engine.H - ph) / 2 - 20;
  c.fillStyle = PALETTE.caveDark;
  c.fillRect(px, py, pw, ph);
  c.strokeStyle = PALETTE.goldAccent;
  c.lineWidth = 2;
  c.strokeRect(px + 0.5, py + 0.5, pw - 1, ph - 1);
  drawText(c, "ПАУЗА", Engine.W / 2, py + 36, { color: PALETTE.gold, size: 22, align: "center" });

  var startY = Engine.H / 2 - 40;
  for (var i = 0; i < _pause.items.length; i++) {
    var ry = startY + i * 34;
    var sel = (i === _pause.idx);
    if (sel) {
      c.fillStyle = PALETTE.goldAccent;
      c.fillRect(Engine.W / 2 - 120, ry - 18, 240, 26);
    }
    drawText(c, _pause.items[i], Engine.W / 2, ry,
      { color: sel ? PALETTE.outline : PALETTE.yurtWhite, size: 16, align: "center", shadow: !sel });
  }
  if (_pause._flash && _pause._flashT > 0) {
    drawText(c, _pause._flash, Engine.W / 2, py + ph + 22,
      { color: PALETTE.gold, size: 14, align: "center" });
  }
}

/* ===================================================================== */
/* BUILT-IN FALLBACK TITLE SCENE (overridden later by 70-ui.js)         */
/* ===================================================================== */
Scenes.register("title", {
  _t: 0,
  enter: function () { this._t = 0; },
  update: function (dt) { this._t += dt; },
  render: function (c) {
    c.fillStyle = "#000000";
    c.fillRect(0, 0, Engine.W, Engine.H);
    drawText(c, "ТАС ЖҮРЕК", Engine.W / 2, Engine.H / 2 - 40,
      { color: PALETTE.gold, size: 48, align: "center" });
    drawText(c, "STONE HEART", Engine.W / 2, Engine.H / 2 + 4,
      { color: PALETTE.boneGrey, size: 20, align: "center" });
    // blinking prompt
    var blink = (Math.floor(this._t / 500) % 2) === 0;
    if (blink) {

/* ===================================================================== */
/* MAIN LOOP                                                             */
/* ===================================================================== */
var _lastTs = 0;

function _frame(ts) {
  if (!_lastTs) _lastTs = ts;
  var dt = ts - _lastTs;
  _lastTs = ts;
  Engine.now = ts;
  if (dt < 0) dt = 0;
  if (dt > 50) dt = 50; // clamp to avoid spiral-of-death after tab-switch

  // re-assert pixel mode each frame (cheap, robust against external resets)
  if (ctx) ctx.imageSmoothingEnabled = false;

  // advance time + decay only when not paused
  if (!Engine.paused) {
    G.gameTimeMs += dt;
    if (typeof Decay !== "undefined" && Decay.tick) {
      try { Decay.tick(dt); } catch (e) {}
    }
    var scene = Scenes.current;
    if (scene && typeof scene.update === "function") {
      try { scene.update(dt); } catch (e) {}
    }
  }

  // advance fade timer (runs even while paused so pause overlay can fade)
  _updateFade(dt);
  if (_pause._flashT > 0) { _pause._flashT -= dt; }

  // RENDER — always draw the active scene
  if (ctx) {
    var sc = Scenes.current;
    if (sc && typeof sc.render === "function") {
      try { sc.render(ctx); }
      catch (e) {
        // last-ditch: don't let a render crash freeze the loop
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, Engine.W, Engine.H);
      }
    } else {
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, Engine.W, Engine.H);
    }
    // pause overlay on top of scene
    if (_pause.open) { _renderPause(ctx); }
    // fade overlay on very top
    if (_fade.alpha > 0) {
      ctx.fillStyle = "rgba(0,0,0," + _fade.alpha.toFixed(3) + ")";
      ctx.fillRect(0, 0, Engine.W, Engine.H);
    }
  }

  // clear per-frame edge input AFTER scene + pause have read it
  Input._clearFrame();

  requestAnimationFrame(_frame);
}

function _updateFade(dt) {
  if (!_fade.active && _fade.alpha <= 0 && _fade.dir >= 0) return;
  if (_fade.active) {
    _fade.t += dt;
    var p = clamp(_fade.t / _fade.dur, 0, 1);
    if (_fade.dir === 1) {        // fading to black
      _fade.alpha = p;
    } else if (_fade.dir === -1) { // revealing
      _fade.alpha = 1 - p;
    }
    if (p >= 1) {
      _fade.active = false;
      var cb = _fade.cb; _fade.cb = null;
      if (_fade.dir === 1) { _fade.alpha = 1; }
      else { _fade.alpha = 0; }
      _fade.dir = 0;
      if (cb) { try { cb(); } catch (e) {} }
    }
  }
}

/* ===================================================================== */
/* BOOT                                                                  */
/* ===================================================================== */
function boot() {
  if (Engine._started) return;
  Engine._started = true;

  _ensureCanvas();
  Input.bind();

  // start in the boot scene as an immediate, drawable placeholder...
  Scenes.current = Scenes.get("boot");
  Scenes.currentId = "boot";
  G.sceneId = "boot";
  if (Scenes.current && typeof Scenes.current.enter === "function") {
    try { Scenes.current.enter({}); } catch (e) {}
  }

  // kick the loop
  _lastTs = 0;
  requestAnimationFrame(_frame);

  // ...then switch to the title INSTANTLY (no fade-out), so a throttled/hidden
  // first frame can never leave the player stranded on the black boot screen.
  setScene("title", {}, true);
}

/* wire DOMContentLoaded -> boot, guarding if document is already loaded */
if (typeof document !== "undefined") {
  if (document.readyState === "complete" || document.readyState === "interactive") {
    // already loaded (e.g. script at end of body): boot on next tick so the
    // rest of the concatenated modules finish executing first
    setTimeout(boot, 0);
  } else {
    document.addEventListener("DOMContentLoaded", boot, false);
  }
}

/* ===================================================================== */
/* DECAY — per-region world-rot model (CONTRACT §10)                     */
/*   level 0..1 per regionId, stored in G.worldDecay. Engine loop calls  */
/*   Decay.tick(dt) every frame (guarded). Every 5 in-game minutes one    */
/*   not-yet-healed location darkens by +0.10. Healed regions are frozen  */
/*   and stepped back toward 0. World starts ~80% grey (chapters seed).   */
/* ===================================================================== */
var Decay = (function () {

  /* tunables pinned by the contract / design */
  var TICK_MS = 5 * 60 * 1000;   // 5 in-game minutes between decay steps
  var STEP    = 0.10;            // +10% per step on one location
  var HEAL_PER_SEC = 0.35;       // how fast a healed region returns color

  /* internal state (NOT serialized — lives outside G; G.worldDecay is truth) */
  var _acc = 0;                  // accumulated ms toward the next decay step
  var _healed = {};              // regionId -> true once healed (frozen + reversing)
  var _order = [];               // round-robin cursor over known regions
  var _cursor = 0;

  function _g() {
    /* always read the live global; create the bag if a module nuked it */
    if (typeof G === "undefined" || !G) return null;
    if (!G.worldDecay || typeof G.worldDecay !== "object") G.worldDecay = {};
    return G.worldDecay;
  }

  /* make sure a region id is tracked in the round-robin order list */
  function _track(regionId) {
    if (typeof regionId !== "string" || !regionId) return;
    if (_order.indexOf(regionId) < 0) _order.push(regionId);
  }

  return {
    /* set/override the initial decay level of a region (chapter setup).
       Top-level safe (only touches G + local state). */
    seed: function (regionId, level) {
      var bag = _g(); if (!bag) return;
      if (typeof regionId !== "string" || !regionId) return;
      var v = (typeof level === "number" && isFinite(level)) ? level : 0.8;
      bag[regionId] = clamp(v, 0, 1);
      _track(regionId);
    },

    /* current decay 0..1 for a region; 0 if unknown (defensive). */
    levelFor: function (regionId) {
      var bag = _g(); if (!bag) return 0;
      var v = bag[regionId];
      if (typeof v !== "number" || !isFinite(v)) return 0;
      return clamp(v, 0, 1);
    },

    /* freeze a region's decay AND begin reversing it toward 0 (quest reward).
       Idempotent. */
    heal: function (regionId) {
      var bag = _g(); if (!bag) return;
      if (typeof regionId !== "string" || !regionId) return;
      _track(regionId);
      if (bag[regionId] === undefined) bag[regionId] = 0;
      _healed[regionId] = true;
      try { if (typeof EventBus !== "undefined" && EventBus.emit) EventBus.emit("decay:heal", { region: regionId }); } catch (e) {}
    },

    /* is a region currently healed/frozen? */
    isHealed: function (regionId) { return !!_healed[regionId]; },

    /* engine loop drives this every frame (guarded by the engine).
       - reverse any healed regions smoothly toward 0
       - accumulate game time; each full TICK_MS darken ONE unhealed location
         by +STEP, round-robin across known regions. */
    tick: function (dt) {
      var bag = _g(); if (!bag) return;
      if (typeof dt !== "number" || !isFinite(dt) || dt < 0) dt = 0;

      /* 1) heal-back: ease healed regions toward fully alive */
      var dSec = dt / 1000;
      for (var rid in _healed) {
        if (!Object.prototype.hasOwnProperty.call(_healed, rid)) continue;
        if (!_healed[rid]) continue;
        var cur = bag[rid];
        if (typeof cur !== "number" || !isFinite(cur)) cur = 0;
        if (cur > 0) {
          cur = clamp(cur - HEAL_PER_SEC * dSec, 0, 1);
          bag[rid] = cur;
        }
      }

      /* 2) decay accrual: one unhealed location darkens per TICK_MS */
      _acc += dt;
      while (_acc >= TICK_MS) {
        _acc -= TICK_MS;
        _stepOne(bag);
      }

      try { if (typeof EventBus !== "undefined" && EventBus.emit) EventBus.emit("decay:tick", { dt: dt }); } catch (e2) {}
    },

    /* overall world health 0..100 used by the endings' final map.
       100 = every known region fully alive (level 0). With no regions
       tracked yet, report a fully-grey world per the dying-steppe premise. */
    restoredPercent: function () {
      var bag = _g(); if (!bag) return 0;
      var ids = [];
      var k;
      for (k = 0; k < _order.length; k++) { if (ids.indexOf(_order[k]) < 0) ids.push(_order[k]); }
      for (k in bag) { if (Object.prototype.hasOwnProperty.call(bag, k) && ids.indexOf(k) < 0) ids.push(k); }
      if (ids.length === 0) return 0;
      var sum = 0;
      for (k = 0; k < ids.length; k++) {
        var v = bag[ids[k]];
        if (typeof v !== "number" || !isFinite(v)) v = 0;
        sum += clamp(v, 0, 1);
      }
      var avgDecay = sum / ids.length;          // 0 alive .. 1 grey
      return clamp(Math.round((1 - avgDecay) * 100), 0, 100);
    },

    /* expose the round-robin region list (read-only-ish helper for chapters) */
    regions: function () { return _order.slice(); }
  };

  /* darken exactly one not-yet-healed region by +STEP, round-robin.
     Skips fully-grey and healed regions; if all are maxed/healed, no-op. */
  function _stepOne(bag) {
    if (_order.length === 0) return;
    var tries = _order.length;
    while (tries-- > 0) {
      if (_cursor >= _order.length) _cursor = 0;
      var rid = _order[_cursor];
      _cursor = (_cursor + 1) % _order.length;
      if (_healed[rid]) continue;
      var cur = bag[rid];
      if (typeof cur !== "number" || !isFinite(cur)) cur = 0;
      if (cur >= 1) continue;
      bag[rid] = clamp(cur + STEP, 0, 1);
      return; // one location per tick
    }
  }
})();

  /* ---- live runtime state for the ACTIVE map ---------------------- */
  var active   = null;            // normalized location currently loaded
  var grid     = null;            // 2D array [y][x] of tile-key strings
  var solidSet = {};              // { tileKey: true } for fast collision lookup
  var npcs     = [];              // live NPC entities for the active map
  var exits    = [];              // live exit/portal descriptors

  /* player entity (tile + pixel position; pixel drives the camera) */
  var player = {
    x: 0, y: 0,                   // tile coords (integer-ish; pixel is source of truth)
    px: 0, py: 0,                 // pixel position (top-left of the tile-sized sprite cell)
    dir: "down",                  // facing: up/down/left/right
    moving: false,
    animT: 0,                     // walk-cycle timer (ms)
    speed: 96                     // pixels / second
  };

  var camX = 0, camY = 0;         // camera top-left in world pixels

  /* dombra "footprint trail" effect: transient glowing tracks revealed
     when the player plays the dombra in the overworld (design §4.1). */
  var trails = [];                // { wx, wy, life, max, kind }
  var trailPulse = 0;             // global pulse timer for glow shimmer

  /* ---------- helpers --------------------------------------------- */

  function _isStr(s) { return typeof s === "string" && s.length > 0; }

  /* Build a normalized 2D tile grid from either `tiles` (2D array) or
     `grid`+`legend` (string rows). `grid` wins if present (per contract). */
  function _buildGrid(loc) {
    var h = loc.h | 0, w = loc.w | 0;
    var out = [], y, x, row;

    if (Array.isArray(loc.grid) && loc.legend) {
      for (y = 0; y < h; y++) {
        var src = (typeof loc.grid[y] === "string") ? loc.grid[y] : "";
        row = [];
        for (x = 0; x < w; x++) {
          var ch = x < src.length ? src.charAt(x) : " ";
          var key = loc.legend[ch];
          row.push(_isStr(key) ? key : null);  // null = empty/transparent cell
        }
        out.push(row);
      }
      return out;
    }

    if (Array.isArray(loc.tiles)) {
      for (y = 0; y < h; y++) {
        var srcRow = Array.isArray(loc.tiles[y]) ? loc.tiles[y] : [];
        row = [];
        for (x = 0; x < w; x++) {
          var t = srcRow[x];
          row.push(_isStr(t) ? t : null);
        }
        out.push(row);
      }
      return out;
    }

    /* no tile data at all — produce an empty grey field so nothing throws */
    for (y = 0; y < h; y++) {
      row = [];
      for (x = 0; x < w; x++) row.push("grass_grey");
      out.push(row);
    }
    return out;
  }

  /* normalize a registered location into a stable internal shape */
  function _normalize(loc) {
    var n = {};
    n.id    = _isStr(loc.id) ? loc.id : ("loc_" + (Object.keys(registry).length));
    n.name  = _isStr(loc.name) ? loc.name : "";
    n.region = _isStr(loc.region) ? loc.region
             : (_isStr(loc.decayRegion) ? loc.decayRegion : n.id);
    n.decayRegion = _isStr(loc.decayRegion) ? loc.decayRegion : n.region;
    n.w = Math.max(1, loc.w | 0 || (Array.isArray(loc.grid) && loc.grid[0] ? loc.grid[0].length : 1));
    n.h = Math.max(1, loc.h | 0 || (Array.isArray(loc.grid) ? loc.grid.length :
                                   (Array.isArray(loc.tiles) ? loc.tiles.length : 1)));
    /* keep raw inputs for grid building */
    n.tiles = loc.tiles; n.grid = loc.grid; n.legend = loc.legend;
    n.solid = Array.isArray(loc.solid) ? loc.solid.slice() : DEFAULT_SOLID.slice();
    n.spawns = (loc.spawns && typeof loc.spawns === "object") ? loc.spawns : {};
    if (!n.spawns["default"]) {
      n.spawns["default"] = { x: clamp((n.w / 2) | 0, 0, n.w - 1),
                              y: clamp((n.h / 2) | 0, 0, n.h - 1) };
    }
    n.npcs  = Array.isArray(loc.npcs)  ? loc.npcs  : [];
    n.exits = Array.isArray(loc.exits) ? loc.exits : [];
    /* optional per-location music cue + ambient bg color */
    n.music = _isStr(loc.music) ? loc.music : null;
    n.bg    = _isStr(loc.bg) ? loc.bg : null;        // palette name for letterbox/void
    n.onEnter = (typeof loc.onEnter === "function") ? loc.onEnter : null;
    n.onExit  = (typeof loc.onExit === "function") ? loc.onExit : null;
    return n;
  }

  /* center camera on the player, clamped to map bounds (letterbox small maps) */
  function _updateCamera() {
    if (!active) return;
    var mapPxW = active.w * TILE * SCALE;
    var mapPxH = active.h * TILE * SCALE;
    var halfW = Engine.W / 2, halfH = Engine.H / 2;
    var cx = player.px + (TILE * SCALE) / 2;
    var cy = player.py + (TILE * SCALE) / 2;
    camX = cx - halfW;
    camY = cy - halfH;
    if (mapPxW <= Engine.W) camX = (mapPxW - Engine.W) / 2;   // center small maps
    else camX = clamp(camX, 0, mapPxW - Engine.W);
    if (mapPxH <= Engine.H) camY = (mapPxH - Engine.H) / 2;
    else camY = clamp(camY, 0, mapPxH - Engine.H);
  }

  /* tile at (tx,ty) or null if OOB / empty */
  function _tileAt(tx, ty) {
    if (!grid) return null;
    if (ty < 0 || ty >= grid.length) return null;
    var r = grid[ty];
    if (!r || tx < 0 || tx >= r.length) return null;
    return r[tx];
  }

  /* is the tile at (tx,ty) blocking? OOB counts as solid (walls of the world) */
  function _solidAt(tx, ty) {
    if (!active) return true;
    if (tx < 0 || ty < 0 || tx >= active.w || ty >= active.h) return true;
    var t = _tileAt(tx, ty);
    if (t == null) return false;          // empty cell is walkable
    return !!solidSet[t];
  }

  /* AABB-vs-tilegrid: can the player's tile-sized box occupy pixel (nx,ny)? */
  function _canStand(nx, ny) {
    var size = TILE * SCALE;
    var pad = 3 * SCALE;                  // small inset so corners feel fair
    var left   = nx + pad;
    var right  = nx + size - 1 - pad;
    var top    = ny + pad;
    var bottom = ny + size - 1 - pad;
    var cs = TILE * SCALE;
    var tlx = Math.floor(left / cs),  tly = Math.floor(top / cs);
    var trx = Math.floor(right / cs), bly = Math.floor(bottom / cs);
    if (_solidAt(tlx, tly)) return false;
    if (_solidAt(trx, tly)) return false;
    if (_solidAt(tlx, bly)) return false;
    if (_solidAt(trx, bly)) return false;
    return true;
  }

  /* tile in front of the player given facing (for interaction / exits) */
  function _frontTile() {
    var tx = Math.round(player.px / (TILE * SCALE));
    var ty = Math.round(player.py / (TILE * SCALE));
    if (player.dir === "up") ty -= 1;
    else if (player.dir === "down") ty += 1;
    else if (player.dir === "left") tx -= 1;
    else if (player.dir === "right") tx += 1;
    return { x: tx, y: ty };
  }

  /* find an NPC adjacent to (or under-front of) the player to interact with */
  function _npcInFront() {
    var ptx = Math.round(player.px / (TILE * SCALE));
    var pty = Math.round(player.py / (TILE * SCALE));
    var f = _frontTile();
    var best = null;
    for (var i = 0; i < npcs.length; i++) {
      var n = npcs[i];
      if (!n) continue;
      var dx = Math.abs(n.x - ptx), dy = Math.abs(n.y - pty);
      var adjacent = (dx + dy) === 1;                 // 4-neighbour
      var inFront = (n.x === f.x && n.y === f.y);
      if (inFront) return n;                          // facing it directly = best
      if (adjacent && !best) best = n;                // otherwise any neighbour
    }
    return best;
  }

  /* trigger an exit if the player's tile is an exit tile */
  function _checkExits() {
    var ptx = Math.round(player.px / (TILE * SCALE));
    var pty = Math.round(player.py / (TILE * SCALE));
    for (var i = 0; i < exits.length; i++) {
      var ex = exits[i];
      if (!ex) continue;
      if (ex.x === ptx && ex.y === pty) {
        _fireExit(ex);
        return true;
      }
    }
    return false;
  }

  function _fireExit(ex) {
    /* door sfx (guarded) */
    try { if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("sfx_door"); } catch (e) {}
    /* custom handler wins if provided */
    if (typeof ex.onEnter === "function") {
      try { ex.onEnter(); } catch (e2) {}
      return;
    }
    var target = _isStr(ex.to) ? ex.to : null;
    var spawn  = _isStr(ex.toSpawn) ? ex.toSpawn : "default";
    if (!target) return;
    /* if the target is a registered MAP location, hot-swap the map in place
       (chapter exits typically map a tile to another map within one scene).
       Otherwise treat the target as a SCENE id and switch scenes. */
    if (registry[target]) {
      load(target, spawn);
    } else if (typeof setScene === "function") {
      setScene(target, { spawn: spawn });
    }
  }

  /* ---------- live NPC / exit binding on load --------------------- */
  function _bindEntities() {
    npcs = [];
    var i, src;
    for (i = 0; i < active.npcs.length; i++) {
      src = active.npcs[i];
      if (!src) continue;
      npcs.push({
        key: _isStr(src.key) ? src.key : null,
        x: src.x | 0,
        y: src.y | 0,
        name: _isStr(src.name) ? src.name : "",
        dir: _isStr(src.dir) ? src.dir : "down",
        onInteract: (typeof src.onInteract === "function") ? src.onInteract : null,
        bobT: Math.random() * 1000
      });
    }
    exits = [];
    for (i = 0; i < active.exits.length; i++) {
      src = active.exits[i];
      if (!src) continue;
      exits.push({
        x: src.x | 0, y: src.y | 0,
        to: _isStr(src.to) ? src.to : null,
        toSpawn: _isStr(src.toSpawn) ? src.toSpawn : "default",
        onEnter: (typeof src.onEnter === "function") ? src.onEnter : null
      });
    }
  }

  /* place the player at a named spawn (tile coords) */
  function _placeAtSpawn(spawnName) {
    var sp = active.spawns[spawnName] || active.spawns["default"];
    var tx = sp && typeof sp.x === "number" ? sp.x : 0;
    var ty = sp && typeof sp.y === "number" ? sp.y : 0;
    tx = clamp(tx | 0, 0, active.w - 1);
    ty = clamp(ty | 0, 0, active.h - 1);
    player.x = tx; player.y = ty;
    player.px = tx * TILE * SCALE;
    player.py = ty * TILE * SCALE;
    player.dir = (sp && _isStr(sp.dir)) ? sp.dir : "down";
    player.moving = false;
    player.animT = 0;
    _updateCamera();
  }

  /* ---------- rendering ------------------------------------------- */

  /* draw one tile through Sprites with decay tint (guarded). Falls back to a
     flat palette rect if Sprites is unavailable or the key is unknown-but-known
     here, so the world is never blank. */
  function _drawTile(c, key, sx, sy, amt) {
    if (key == null) return;
    var size = TILE * SCALE;
    if (typeof Sprites !== "undefined" && Sprites.draw && Sprites.has && Sprites.has(key)) {
      try {
        Sprites.draw(c, key, sx, sy, SCALE, { tint: { toName: "greySteppe", amt: amt } });
        return;
      } catch (e) { /* fall through to flat fill */ }
    }
    /* defensive flat fill: pick a sensible base color for known tile names */
    var base = _fallbackTileColor(key);
    var col = base;
    try { if (typeof lerpColor === "function") col = lerpColor(base, PALETTE.greySteppe, amt); } catch (e2) {}
    c.fillStyle = col;
    c.fillRect(sx, sy, size, size);
  }

  function _fallbackTileColor(key) {
    switch (key) {
      case "grass":      return PALETTE.grassLight;
      case "grass_grey": return PALETTE.deadGreen;
      case "water":      return PALETTE.waterLight;
      case "rock":       return PALETTE.caveStone;
      case "sand":       return PALETTE.boneGrey;
      case "yurt":       return PALETTE.yurtWhite;
      case "yurt_stone": return PALETTE.caveStone;
      case "cave_floor": return PALETTE.caveDark;
      case "cave_wall":  return PALETTE.caveStone;
      case "sky_white":  return PALETTE.skyWhite;
      case "campfire":   return PALETTE.caveFire;
      case "tree":       return PALETTE.leaf;
      case "tree_grey":  return PALETTE.deadGreen;
      case "grave":      return PALETTE.boneGrey;
      case "petroglyph": return PALETTE.earth;
      default:           return PALETTE.grassDark;
    }
  }

  function render(c) {
    if (!active || !grid) {
      c.fillStyle = "#000000";
      c.fillRect(0, 0, Engine.W, Engine.H);
      return;
    }
    _updateCamera();

    var amt = Decay.levelFor(active.region);
    var size = TILE * SCALE;

    /* background void (palette-named or black), greyed by decay */
    var bgName = active.bg || "night";
    var bgCol;
    try { bgCol = (PALETTE[bgName] || "#000000"); } catch (e) { bgCol = "#000000"; }
    c.fillStyle = bgCol;
    c.fillRect(0, 0, Engine.W, Engine.H);

    /* visible tile window (only draw what the camera shows) */
    var startTx = Math.floor(camX / size) - 1;
    var startTy = Math.floor(camY / size) - 1;
    var endTx = Math.ceil((camX + Engine.W) / size) + 1;
    var endTy = Math.ceil((camY + Engine.H) / size) + 1;
    startTx = clamp(startTx, 0, active.w);
    startTy = clamp(startTy, 0, active.h);
    endTx = clamp(endTx, 0, active.w);
    endTy = clamp(endTy, 0, active.h);

    var ty, tx;
    for (ty = startTy; ty < endTy; ty++) {
      for (tx = startTx; tx < endTx; tx++) {
        var key = _tileAt(tx, ty);
        if (key == null) continue;
        var sx = rint(tx * size - camX);
        var sy = rint(ty * size - camY);
        _drawTile(c, key, sx, sy, amt);
      }
    }

    /* dombra footprint trails (under entities) */
    _renderTrails(c);

    /* exit markers (subtle gold chevron on the floor so portals are findable) */
    for (var ei = 0; ei < exits.length; ei++) {
      var ex = exits[ei];
      var exX = rint(ex.x * size - camX);
      var exY = rint(ex.y * size - camY);
      if (exX < -size || exX > Engine.W || exY < -size || exY > Engine.H) continue;
      var blink = 0.35 + 0.25 * Math.sin(trailPulse / 260 + ex.x + ex.y);
      c.save();
      c.globalAlpha = blink;
      c.fillStyle = PALETTE.gold;
      var mxc = exX + size / 2;
      c.fillRect(mxc - 6, exY + size - 8, 12, 3);
      c.fillRect(mxc - 3, exY + size - 12, 6, 3);
      c.restore();
    }

    /* NPCs + player, sorted by world-y so lower sprites overlap higher ones */
    var drawList = [];
    var i, n;
    for (i = 0; i < npcs.length; i++) {
      n = npcs[i];
      drawList.push({ y: n.y, kind: "npc", ref: n });
    }
    drawList.push({ y: player.py / size, kind: "player", ref: player });
    drawList.sort(function (a, b) { return a.y - b.y; });

    for (i = 0; i < drawList.length; i++) {
      if (drawList[i].kind === "npc") _renderNpc(c, drawList[i].ref, size, amt);
      else _renderPlayer(c, size);
    }

    /* interaction hint: floating "Z" prompt over an interactable NPC */
    var target = _npcInFront();
    if (target && !(typeof Dialogue !== "undefined" && Dialogue.active)) {
      var hx = rint(target.x * size - camX) + size / 2;
      var hy = rint(target.y * size - camY) - 6;
      var pulse = 0.6 + 0.4 * Math.sin(trailPulse / 200);
      c.save();
      c.globalAlpha = pulse;
      drawText(c, "Z", hx, hy, { color: PALETTE.gold, size: 16, align: "center" });
      c.restore();
    }

    /* location name plate (top-left), faint */
    if (active.name) {
      c.save();
      c.globalAlpha = 0.85;
      drawText(c, active.name, 14, 26, { color: PALETTE.gold, size: 14, align: "left" });
      c.restore();
    }
  }

  function _spriteShadow(c, sx, sy, size) {
    c.save();
    c.globalAlpha = 0.28;
    c.fillStyle = PALETTE.shadow;
    var sw = size * 0.6;
    c.fillRect(sx + (size - sw) / 2, sy + size - 5, sw, 4);
    c.restore();
  }

  function _renderNpc(c, n, size, amt) {
    var sx = rint(n.x * size - camX);
    var sy = rint(n.y * size - camY);
    if (sx < -size || sx > Engine.W || sy < -size || sy > Engine.H) return;
    n.bobT += 16;
    var bob = Math.round(Math.sin(n.bobT / 600) * 1);
    _spriteShadow(c, sx, sy + bob, size);
    if (n.key && typeof Sprites !== "undefined" && Sprites.draw && Sprites.has && Sprites.has(n.key)) {
      try { Sprites.draw(c, n.key, sx, sy + bob, SCALE, {}); return; }
      catch (e) {}
    }
    /* fallback NPC marker so a missing sprite is visible but not a crash */
    c.fillStyle = PALETTE.feltRed;
    c.fillRect(sx + size * 0.25, sy + size * 0.15, size * 0.5, size * 0.7);
  }

  function _renderPlayer(c, size) {
    var sx = rint(player.px - camX);
    var sy = rint(player.py - camY);
    _spriteShadow(c, sx, sy, size);

    /* choose sprite: walk sheet while moving, idle otherwise; flip for left */
    var key = "erzhan";
    var frame = 0;
    var flip = false;
    if (player.moving) {
      if (typeof Sprites !== "undefined" && Sprites.has && Sprites.has("erzhan_walk")) {
        key = "erzhan_walk";
        frame = (Math.floor(player.animT / 140) % 2);
      }
    }
    if (player.dir === "left") flip = true;

    if (typeof Sprites !== "undefined" && Sprites.draw && Sprites.has && Sprites.has(key)) {
      try { Sprites.draw(c, key, sx, sy, SCALE, { frame: frame, flip: flip }); return; }
      catch (e) {}
    }
    /* fallback player marker */
    c.fillStyle = PALETTE.skyBlue;
    c.fillRect(sx + size * 0.25, sy + size * 0.12, size * 0.5, size * 0.76);
  }

  function _renderTrails(c) {
    if (trails.length === 0) return;
    var size = TILE * SCALE;
    c.save();
    for (var i = 0; i < trails.length; i++) {
      var t = trails[i];
      var a = clamp(t.life / t.max, 0, 1);
      var sx = rint(t.wx - camX);
      var sy = rint(t.wy - camY);
      var glow = 0.5 + 0.5 * Math.sin(trailPulse / 160 + i);
      c.globalAlpha = a * 0.7 * glow;
      c.fillStyle = PALETTE.gold;
      var r = 3 + a * 3;
      c.fillRect(sx - r / 2 + size / 2, sy - r / 2 + size / 2, r, r);
    }
    c.restore();
  }

  /* ---------- update ---------------------------------------------- */

  function update(dt) {
    if (!active) return;
    trailPulse += dt;

    /* age out trails */
    if (trails.length) {
      for (var i = trails.length - 1; i >= 0; i--) {
        trails[i].life -= dt;
        if (trails[i].life <= 0) trails.splice(i, 1);
      }
    }

    /* don't move the world while a dialogue is on screen */
    if (typeof Dialogue !== "undefined" && Dialogue.active) {
      player.moving = false;
      return;
    }

    var ix = 0, iy = 0;
    if (typeof Input !== "undefined" && Input.keys) {
      if (Input.keys.left)  ix -= 1;
      if (Input.keys.right) ix += 1;
      if (Input.keys.up)    iy -= 1;
      if (Input.keys.down)  iy += 1;
    }

    /* face direction (prefer horizontal for diagonal so flip reads cleanly) */
    if (ix < 0) player.dir = "left";
    else if (ix > 0) player.dir = "right";
    else if (iy < 0) player.dir = "up";
    else if (iy > 0) player.dir = "down";

    var moving = (ix !== 0 || iy !== 0);
    player.moving = moving;

    if (moving) {
      player.animT += dt;
      var step = player.speed * (dt / 1000) * SCALE;
      /* normalize diagonal so it isn't faster */
      if (ix !== 0 && iy !== 0) step *= 0.7071;

      /* move axis-separately so we slide along walls */
      var nx = player.px + ix * step;
      if (_canStand(nx, player.py)) player.px = nx;
      var ny = player.py + iy * step;
      if (_canStand(player.px, ny)) player.py = ny;

      /* keep the integer tile coords in sync (used by interaction/exits) */
      player.x = Math.round(player.px / (TILE * SCALE));
      player.y = Math.round(player.py / (TILE * SCALE));

      _updateCamera();
      _checkExits();
    } else {
      player.animT = 0;
    }

    /* Z near an NPC -> interact (poll the edge so it fires once) */
    if (typeof Input !== "undefined" && Input.pressed && Input.pressed("confirm")) {
      interact();
    }
  }

  /* explicit interaction: talk to the NPC in front / adjacent (if any) */
  function interact() {
    if (typeof Dialogue !== "undefined" && Dialogue.active) return false;
    var n = _npcInFront();
    if (n && n.onInteract) {
      try { n.onInteract(n); } catch (e) {}
      return true;
    }
    return false;
  }

  /* dombra in the overworld: reveal glowing "tracks" from the player outward
     toward exits & NPCs (design §4.1 "следы"), play the unfinished kui, and
     (the decay-slow is conveyed by the act of playing — Decay already freezes
     healed regions; here we surface the audiovisual). Guarded throughout. */
  function dombra() {
    if (!active) return;
    try { if (typeof Audio !== "undefined" && Audio.playCue) Audio.playCue("kui_erzhan_unfinished"); } catch (e) {}
    var size = TILE * SCALE;
    var ox = player.px, oy = player.py;
    var i, t;
    /* trail toward each exit */
    for (i = 0; i < exits.length; i++) {
      _emitTrailLine(ox, oy, exits[i].x * size, exits[i].y * size);
    }
    /* trail toward each NPC */
    for (i = 0; i < npcs.length; i++) {
      _emitTrailLine(ox, oy, npcs[i].x * size, npcs[i].y * size);
    }
    /* a small ring of sparks around the player even with no targets */
    for (i = 0; i < 8; i++) {
      var ang = (i / 8) * Math.PI * 2;
      trails.push({
        wx: ox + Math.cos(ang) * size * 0.8,
        wy: oy + Math.sin(ang) * size * 0.8,
        life: 1400, max: 1400
      });
    }
  }

  function _emitTrailLine(x0, y0, x1, y1) {
    var steps = 10;
    for (var s = 1; s <= steps; s++) {
      var f = s / steps;
      trails.push({
        wx: lerp(x0, x1, f),
        wy: lerp(y0, y1, f),
        life: 1600 + s * 60,
        max: 1600 + s * 60
      });
    }
  }

  /* ---------- public load ----------------------------------------- */

  function load(id, spawnName) {
    var loc = registry[id];
    if (!loc) return false;        // unknown id -> graceful no-op (no throw)
    /* let the previous map run its onExit hook */
    if (active && active.onExit) { try { active.onExit(); } catch (e) {} }

    active = loc;
    grid = _buildGrid(loc);

    if (!S.active || !c) return;

    var w = W(), h = H();
    var bx = BOX.marginX;
    var bw = w - BOX.marginX * 2;
    var bh = BOX.h;
    var by = h - bh - BOX.bottomGap;

    // soft drop shadow under the box

    c.strokeStyle = pal("goldAccent", "#C8960C");
    c.strokeRect(bx + 1.5, by + 1.5, bw - 3, bh - 3);
    c.lineWidth = 1;
    c.strokeStyle = pal("gold", "#D4A017");

    var pX = bx + BOX.pad;
    var pY = by + BOX.pad;

    c.fillStyle = pal("night", "#0E0F1A");
    c.fillRect(pX, pY, pSize, pSize);
    c.lineWidth = 2;
    c.strokeStyle = pal("earth", "#7D4E2A");
    c.strokeRect(pX + 1, pY + 1, pSize - 2, pSize - 2);

      // Character sprites are 16x24 with anchor "bottom" (x-centered, feet at
      // the draw point). Place feet at the slot's bottom-center so the full
      // figure fits the 96px slot: 24h * scale 4 == 96 == pSize.
      drawSprite(c, portrait, pX + (pSize >> 1), pY + pSize, 4, { alpha: 1 });
    } else if (portrait) {
      // unknown sprite key: Sprites.draw would magenta-box; keep the slot
      // tidy by leaving it blank rather than a magenta block.
      // (intentionally draw nothing extra)
    }

    var textX = pX + pSize + BOX.pad;
    var textTop = by + BOX.pad;
    var textW = bx + bw - BOX.pad - textX;
    if (textW < 40) textW = 40; // guard tiny widths

    var speaker = (S.node && typeof S.node.speaker === "string") ? S.node.speaker : "";
    var lineY = textTop + 4;
    if (speaker && speaker.length) {

      var nameW = c.measureText(speaker).width + 14;
      c.fillStyle = pal("feltRed", "#C0392B");
      c.fillRect(textX - 4, textTop - 2, nameW, BOX.nameSize + 8);
      drawTextSafe(c, speaker, textX + 3, textTop + BOX.nameSize, {
        color: pal("yurtWhite", "#F5ECD7"), size: BOX.nameSize, align: "left"
      });
      lineY = textTop + BOX.nameSize + 16;
    } else {
      lineY = textTop + 8 + BOX.textSize;

      S.wrapped = wrapText(c, S.full, textW, BOX.textSize);

    var ty = lineY;

    for (var i = 0; i < S.wrapped.length; i++) {
      var lineStr = S.wrapped[i];
      var lineLen = lineStr.length;
      var visible;
      if (used + lineLen <= shownInt) {
        visible = lineStr;            // whole line shown
      } else if (used >= shownInt) {
        visible = "";                 // not reached yet
      } else {
        visible = lineStr.slice(0, shownInt - used); // partial
      }
      if (ty <= bodyBottom + BOX.lineH) {
        if (visible.length) {
          drawTextSafe(c, visible, textX, ty, {
            color: pal("yurtWhite", "#F5ECD7"), size: BOX.textSize, align: "left"

        }
      }
      used += lineLen + 1; // +1 for the join (space/newline) between lines
      ty += BOX.lineH;
    }

    // ----- stage direction (note) — subtle grey italic, bottom-left of text col -----
    var note = (S.node && typeof S.node.note === "string") ? S.node.note : "";
    if (note && note.length && S.revealed && !S.choices) {
      c.save();
      c.font = 'italic 400 ' + BOX.noteSize + 'px "Courier New", monospace';
      c.textAlign = "left";
      c.fillStyle = pal("boneGrey", "#B8B4A4");
      c.globalAlpha = 0.85;
      var noteY = by + bh - BOX.pad - 2;
      c.fillText("[" + note + "]", textX, noteY);
      c.restore();

    // ----- choices -----
    if (S.choices && S.revealed) {
      var chTop = by + bh - BOX.pad - (S.choices.length * 22) + 4;
      for (var ci = 0; ci < S.choices.length; ci++) {

        var sel = (ci === S.cursor);
        var label = (ci + 1) + ". " + S.choices[ci].label;
        var hasDombra = S.choices[ci].dombra === true;
        if (sel) {
          // highlight bar
          c.fillStyle = pal("goldAccent", "#C8960C");
          c.fillRect(textX - 6, cy - 15, textW + 4, 20);

        drawTextSafe(c, label, textX, cy, {
          color: sel ? pal("outline", "#1A0A00") : pal("yurtWhite", "#F5ECD7"),
          size: 15, align: "left", shadow: !sel

        if (hasDombra) {

    // ----- dombra icon pulse (top-right of the box) -----
    if (S.dombraPulse > 0) {
      var t = S.dombraPulse / 900;           // 1 -> 0
      var a = cl(t, 0, 1);

      c.globalAlpha = 0.35 * a;
      c.fillStyle = pal("gold", "#D4A017");

      c.beginPath();
      c.arc(iconX + 14, iconY + 14, r, 0, Math.PI * 2);
      c.fill();
      c.restore();
      // the dombra icon sprite if present, else a small drawn glyph
      if (spriteHas("dombra_icon")) {
        drawSprite(c, "dombra_icon", iconX, iconY, 2, { alpha: a });
      } else {
        drawTextSafe(c, "♪", iconX + 8, iconY + 22, {
          color: pal("gold", "#D4A017"), size: 22, align: "left"
        });
      }
    }

    c.restore();
  }

  /* drawText wrapper: prefer the engine helper, fall back to raw fillText */
  function drawTextSafe(c, str, x, y, opts) {

      try { drawText(c, str, x, y, opts); return; } catch (e) {}

    c.font = '700 ' + (opts.size || 16) + 'px "Courier New", monospace';
    c.textAlign = opts.align || "left";
    if (opts.shadow !== false) {
      c.fillStyle = opts.shadowColor || pal("outline", "#1A0A00");
      c.fillText(String(str), x + 2, y + 2);

  /* ------------------------------------------------------------------ */
  /* PUBLIC API (CONTRACT.md §7)                                        */
  /* ------------------------------------------------------------------ */

    // onComplete so callers that chain setScene aren't stranded).
    if (!tree || typeof tree !== "object") {
      if (typeof onComplete === "function") { try { onComplete(); } catch (e) {} }
      return;
    }

    S.active = true;
    S.tree = tree;
    S.onComplete = (typeof onComplete === "function") ? onComplete : null;
    S.ending = false;
    S.waitingRhythm = false;
    S.dombraPulse = 0;

    emit("dialogue:start", {});

    // entry node is "start"; if absent, fall back to the first own key,
    // and if there are none, end immediately.
    var entry = null;
    if (Object.prototype.hasOwnProperty.call(tree, "start")) {
      entry = "start";
    } else {

      }

    if (entry == null) { finishTree(); return; }
    gotoNode(entry);
  }

    /* begin running a tree from node "start" (overlays current scene) */
    start: start,

    /* boolean — true while a tree is running */
    get active() { return S.active; },

    /* explicit predicate form required by the brief */
    isOpen: function () { return S.active === true; },

    /* the hosting scene drives these three while Dialogue.active */
    update: update,
    render: render,
    onKey: onKey,

    /* convenience: programmatically advance (rarely needed; cutscenes etc.) */
    advance: function () {
      if (!S.active) return;
      if (S.choices) { selectChoice(S.cursor); }
      else if (!S.revealed) { S.shown = totalChars(); S.revealed = true; }
      else { advanceFromNode(); }
    },

    /* force-close without firing onComplete (e.g. scene teardown) */
    close: function () {
      if (!S.active) return;
      S.ending = true;

       choice-style patch consistently (read-only helper; guarded) */
    applySet: applySet

/* ---------- tiny local helpers (self-sufficient; never assume engine util

var _BH = (typeof Engine !== "undefined" && Engine.H) ? Engine.H : 600;

    c.fillText(String(str), x + 2, y + 2);

  c.fillRect(x, y, w, h);
  c.strokeStyle = border || _pal("goldAccent", "#C8960C");

  var col;

/* =====================================================================
   RHYTHM  — the falling-arrow dombra minigame (CONTRACT §9)

   to convince" moments. Draws itself as an overlay scene while active and
   restores control on completion via onResult(accuracyPct 0..100).

var Rhythm = (function () {

  /* timing windows (ms), per contract: ±120 = hit, ±60 = perfect */
  var WIN_HIT = 120;
  var WIN_PERFECT = 60;

  /* lane geometry */
  var LANES = 4;
  var LANE_KEY = ["left", "down", "up", "right"];   // arrow mapping per contract
  var LANE_NUM = ["choice1", "choice2", "choice3", "choice4"]; // 1 2 3 4 alternates
  var LANE_GLYPH = ["←", "↓", "↑", "→"];   // ← ↓ ↑ →
  var LANE_COLOR = ["feltRed", "skyBlue", "gold", "grassLight"];

  var FIELD = { x: 250, y: 40, w: 300, h: 470 };
  var HIT_Y = FIELD.y + FIELD.h - 70;   // the hit line near the bottom
  var FALL_MS = 1900;                    // ms a note takes to fall the full field
  var ARROW_R = 22;                      // arrow half-size (px)

  /* runtime state */
  var st = {
    active: false,
    notes: [],          // [{lane, t, hit:false, judged:false, result:"", flashT:0}]
    bpm: 90,
    onResult: null,
    elapsed: 0,
    startDelay: 1100,   // lead-in so the first note isn't instantly upon the player
    lastT: 0,           // time of last note (+ tail) -> when we resolve
    laneFlash: [0, 0, 0, 0], // per-lane glow timers (audio-synced + on press)
    judgements: [],     // floating "PERFECT/GOOD/MISS" popups
    counts: { perfect: 0, good: 0, miss: 0 },
    total: 0,
    score: 0,           // weighted accuracy points (perfect=1, good=0.6)
    finished: false,
    resolveT: 0,        // small linger before reporting result
    prevId: null,       // scene id to restore (we overlay via setScene)
    title: ""           // optional caption for the moment

  /* convert a melody entry into {lane,t} robustly. Accept {lane,t} as the
     canonical form; tolerate {semis,...} by mapping it onto a lane. */
  function _normMelody(melody) {
    var out = [];
    if (!melody || !melody.length) return out;
    var run = 0;
    for (var i = 0; i < melody.length; i++) {
      var m = melody[i];
      if (m == null) continue;
      var lane, t;
      if (typeof m === "number") {
        lane = ((m % LANES) + LANES) % LANES;
        t = run; run += 480;
      } else {
        if (typeof m.t === "number") { t = m.t; }
        else { t = run; run += (m.dur || 480); }
        if (typeof m.lane === "number") {
          lane = ((m.lane | 0) % LANES + LANES) % LANES;
        } else if (typeof m.semis === "number") {
          lane = ((m.semis | 0) % LANES + LANES) % LANES;

  function _ensureMemArray() {

    /* the canonical id list (read-only convenience for chapter files) */
    IDS: IDS.slice(),

    /* true if this petroglyph is one of the 12 canonical ids */
    isPetroglyph: function (id) {
      for (var i = 0; i < IDS.length; i++) { if (IDS[i] === id) return true; }
      return false;

    /* has this petroglyph already been collected? */
    has: function (id) {

      return G.memories.indexOf(id) !== -1;
    },

    /* number collected, 0..12 */
    count: function () {
      _ensureMemArray();

    },

    /* all 12 collected? */
    complete: function () {
      return this.count() >= IDS.length;

    /* return the Cutscene timeline array for a petroglyph id (always valid) */
    flashback: function (id) {
      var tl = FLASHBACKS[id];

       Idempotent — collecting an already-held id does nothing. `onDone`
       (optional) fires after the flashback (or immediately if no Cutscene). */
    collect: function (id, onDone) {
      _ensureMemArray();
      if (!G || !Array.isArray(G.memories)) {
        if (typeof onDone === "function") { try { onDone(); } catch (e) {} }
        return false;
      }
      // already have it -> no-op (but still run onDone so callers can continue)
      if (G.memories.indexOf(id) !== -1) {
        if (typeof onDone === "function") { try { onDone(); } catch (e) {} }
        return false;
      }
      G.memories.push(id);

      // petroglyph collected sting (guarded)
      if (typeof Audio !== "undefined" && Audio && typeof Audio.playCue === "function") {
        try { Audio.playCue("sfx_petroglyph"); } catch (e) {}
      }

      // signal listeners (guarded; never throws out)
      if (typeof EventBus !== "undefined" && EventBus && typeof EventBus.emit === "function") {
        try { EventBus.emit("memory:collect", { id: id, count: G.memories.length }); } catch (e) {}
      }

      // fire the scripted flashback via the Cutscene overlay (guarded — Cutscene
      // is defined in 70-ui.js which loads AFTER this file, so it always exists
      // by the time collect() can be called from a scene callback; if for any
      // reason it is missing, we just record silently and continue).
      var tl = this.flashback(id);
      if (typeof Cutscene !== "undefined" && Cutscene && typeof Cutscene.play === "function") {
        try {
          Cutscene.play(tl, function () {
            if (typeof onDone === "function") { try { onDone(); } catch (e) {} }
          });
        } catch (e) {
          if (typeof onDone === "function") { try { onDone(); } catch (e2) {} }
        }
      } else {
        if (typeof onDone === "function") { try { onDone(); } catch (e) {} }
      }
      return true;
    },

    /* list of ids still missing (for optional HUD / completion hints) */
    missing: function () {
      _ensureMemArray();
      var out = [];
      for (var i = 0; i < IDS.length; i++) {
        if (!this.has(IDS[i])) out.push(IDS[i]);
      }
      return out;
    }
  };
})();

/* QUESTS — state machine + region healing on completion                 */
/* ===================================================================== */
var Quests = (function () {

  /* Quest -> region mapping. Completing a quest that has a region calls
     Decay.heal(region), restoring colour to that part of the steppe. Region
     ids match the Decay/World region ids used by the world. Quests not listed
     here simply have no region to heal (story-only quests). Chapter files
     register their own quests by id; these are the canonical region quests. */
  var QUEST_REGION = {
    // Chapter 1 — Аул Жетіқаз: the four points of the compass / dying land
    q_four_winds:     "jetiqaz",
    q_jetiqaz:        "jetiqaz",
    // Chapter 2 — Долина Кобланды: free the children, weaken Жалмауыз
    q_jalmauyz:       "koblandy",
    q_children:       "koblandy",
    q_koblandy:       "koblandy",
    // Chapter 3 — Жер Асты: release the lost spirits / put Дөнен to rest
    q_zher_asty:      "zher_asty",
    q_donen:          "zher_asty",
    // Chapter 4 — Хан Тәңірі: lift Аяулым's curse, reach Тәңір-Ана
    q_ayaulym_curse:  "khan_tangiri",
    q_khan_tangiri:   "khan_tangiri",
    // Chapter 5 — the three жузы: each alliance heals its aul's region
    q_dosan:          "uly_juz",
    q_marat:          "orta_juz",
    q_erlan:          "kishi_juz",
    // Chapter 6 — Қара Жол: the march north through the dead lands
    q_qara_jol:       "qara_jol",
    // Сарыарка central hub
    q_saryarka:       "saryarka"
  };

  function _ensureQuests() {
    if (!G) return;
    if (!G.quests || typeof G.quests !== "object") G.quests = {};
  }

  /* normalize whatever is stored to one of the three canonical strings */
  function _norm(v) {
    if (v === "active" || v === "done") return v;
    return "inactive";
  }

  return {
    /* region a quest heals on completion (or null) */
    regionFor: function (id) {
      return Object.prototype.hasOwnProperty.call(QUEST_REGION, id) ? QUEST_REGION[id] : null;
    },

    /* current state of a quest: "inactive" | "active" | "done" */
    state: function (id) {
      _ensureQuests();
      if (!G || !G.quests) return "inactive";
      return _norm(G.quests[id]);
    },

    isActive: function (id) { return this.state(id) === "active"; },
    isDone:   function (id) { return this.state(id) === "done"; },

    /* start a quest: inactive -> active. No-op if already active OR done. */
    start: function (id) {
      _ensureQuests();
      if (!G || !G.quests || !id) return;
      var cur = _norm(G.quests[id]);
      if (cur === "done" || cur === "active") return;
      G.quests[id] = "active";
      if (typeof Audio !== "undefined" && Audio && typeof Audio.playCue === "function") {
        try { Audio.playCue("sfx_select"); } catch (e) {}
      }
      if (typeof EventBus !== "undefined" && EventBus && typeof EventBus.emit === "function") {
        try { EventBus.emit("quest:start", { id: id }); } catch (e) {}
      }
    },

    /* optional progress bookkeeping. Stores a per-quest step under a private
       map; never downgrades state. Safe to call with just `id`. */
    advance: function (id, step) {
      _ensureQuests();
      if (!G || !G.quests || !id) return;
      var cur = _norm(G.quests[id]);
      if (cur === "done") return;          // finished quests don't regress
      if (cur === "inactive") { G.quests[id] = "active"; cur = "active"; }
      // keep lightweight progress on G.flags so it serializes with the save
      if (step !== undefined) {
        if (!G.flags || typeof G.flags !== "object") G.flags = {};
        G.flags["questStep_" + id] = step;
      }
      if (typeof EventBus !== "undefined" && EventBus && typeof EventBus.emit === "function") {
        try { EventBus.emit("quest:advance", { id: id, step: step }); } catch (e) {}
      }
    },

    /* read the stored step for a quest (or undefined) */
    step: function (id) {
      if (!G || !G.flags) return undefined;
      return G.flags["questStep_" + id];
    },

    /* complete a quest: -> done, play confirm, and HEAL the mapped region
       (stops + reverses decay there). Idempotent — completing twice does
       nothing the second time. */
    complete: function (id) {
      _ensureQuests();
      if (!G || !G.quests || !id) return;
      if (_norm(G.quests[id]) === "done") return;   // already done
      G.quests[id] = "done";

      if (typeof Audio !== "undefined" && Audio && typeof Audio.playCue === "function") {
        try { Audio.playCue("sfx_confirm"); } catch (e) {}
      }

      // heal the region this quest restores (guarded — Decay lives in 30-map.js)
      var region = this.regionFor(id);
      if (region && typeof Decay !== "undefined" && Decay && typeof Decay.heal === "function") {
        try { Decay.heal(region); } catch (e) {}
        // a soft heal sting for the land returning (guarded)
        if (typeof Audio !== "undefined" && Audio && typeof Audio.playCue === "function") {
          try { Audio.playCue("sfx_heal"); } catch (e) {}
        }
      }

      if (typeof EventBus !== "undefined" && EventBus && typeof EventBus.emit === "function") {
        try { EventBus.emit("quest:complete", { id: id, region: region }); } catch (e) {}
      }
    },

    /* array of currently-active quest ids (for the HUD) */
    active: function () {
      _ensureQuests();
      var out = [];
      if (!G || !G.quests) return out;
      for (var k in G.quests) {
        if (!Object.prototype.hasOwnProperty.call(G.quests, k)) continue;
        if (_norm(G.quests[k]) === "active") out.push(k);
      }
      return out;
    },

    /* array of completed quest ids */
    done: function () {
      _ensureQuests();
      var out = [];
      if (!G || !G.quests) return out;
      for (var k in G.quests) {
        if (!Object.prototype.hasOwnProperty.call(G.quests, k)) continue;
        if (_norm(G.quests[k]) === "done") out.push(k);
      }
      return out;
    }
  };
})();

/* ENDINGS — deterministic three-way resolver (hidden moral weight)      */
/* ===================================================================== */
var Endings = (function () {

  /* Tunable thresholds for the hidden signals. The kill counter is NEVER
     shown in the UI — it is read only here, at resolution time. */
  var KILL_THRESHOLD = 300;   // DESIGN §8 ending A: "убил больше 300 существ"
  var TRUST_RECONCILED = 3;   // "high" Аяулым trust => reconciled (path B/C friendly)

  function _num(v) { return (typeof v === "number" && !isNaN(v)) ? v : 0; }
  function _bool(v) { return v === true; }
  function _str(v) { return (typeof v === "string") ? v : ""; }

  /* did the player use the dombra in the key scenes? We treat this as true
     when the unfinished kui has progressed past the start (the father's 8
     notes were learned, or the player banked dombra moments via flags). This
     is the "сыграл домброй во всех ключевых сценах" signal for ending B. */
  function _usedDombraInKeyScenes() {
    if (!G) return false;
    if (_num(G.dombraMelodyLearned) >= 1) return true;
    if (G.flags && (_bool(G.flags.dombraMarat) || _bool(G.flags.dombraErlan) ||
                    _bool(G.flags.playedForSerik) || _bool(G.flags.dombraUsed))) {
      return true;
    }
    return false;
  }

  /* reconciled with Аяулым: she did NOT leave AND trust is high */
  function _reconciledWithAyaulym() {
    if (!G) return false;
    return (!_bool(G.ayaulymLeft)) && (_num(G.ayaulymTrust) >= TRUST_RECONCILED);
  }

  var api = {
    id: null,   // caches the last resolved letter ("a"|"b"|"c")

    /* expose the threshold so tests / chapter authors can reason about it,
       but it is never rendered. */
    KILL_THRESHOLD: KILL_THRESHOLD,

    /* read-only views of the three signals (handy for debugging, never UI) */
    signals: function () {
      var memCount = (typeof Memory !== "undefined" && Memory && typeof Memory.count === "function")
        ? Memory.count() : ((G && Array.isArray(G.memories)) ? G.memories.length : 0);
      var memComplete = memCount >= 12;
      return {
        killCount: _num(G && G.killCount),
        memCount: memCount,
        memComplete: memComplete,
        ayaulymLeft: _bool(G && G.ayaulymLeft),
        ayaulymTrust: _num(G && G.ayaulymTrust),
        reconciled: _reconciledWithAyaulym(),
        usedDombra: _usedDombraInKeyScenes(),
        serikPath: _str(G && G.serikPath)
      };
    },

    /* Endings.resolve() -> "a" | "b" | "c".
       Deterministic priority so EXACTLY one letter is returned.

       Per DESIGN.md §8 + CONTRACT §11:
         A (БАТЫР, кровавая):  killCount > 300 AND ayaulymLeft AND memories incomplete.
         B (КҮЙШІ, музыкальная): all 12 memories AND dombra used in key scenes AND
                                 reconciled with Аяулым.
         C (ХРАНИТЕЛЬ, одинокая): the understanding/defending path with Серік
                                  (serikPath === "understand").

       Resolution order weighs the strong "canonical" signals first so the
       intended ending wins, and ties resolve toward B, then C, then A. */
    resolve: function () {
      var s = this.signals();

      // --- strongest authored signal: the full musical ending ------------
      // All 12 memories + dombra used in the key scenes + reconciled with
      // Аяулым => unambiguously КҮЙШІ. (All 12 memories strongly leans B.)
      if (s.memComplete && s.usedDombra && s.reconciled) {
        this.id = "b";
        return "b";
      }

      // --- the lonely keeper: chose understanding/defending Серік --------
      // serikPath "understand" is an explicit, deliberate dialogue lean.
      if (s.serikPath === "understand") {
        this.id = "c";
        return "c";
      }

      // --- the bloody hero: force, sent Аяулым away, ignored the memories -
      if (s.killCount > KILL_THRESHOLD && s.ayaulymLeft && !s.memComplete) {
        this.id = "a";
        return "a";
      }

      // ----- no clean A/B/C trigger: weigh the leftover signals ----------
      // The story still needs a single deterministic letter. We score each
      // ending from the partial signals and pick the highest; ties resolve
      // toward B, then C, then A (the contract's tie order).
      var scoreA = 0, scoreB = 0, scoreC = 0;

      // B accrues from the canonical/musical signals.
      if (s.memComplete) scoreB += 3;            // all memories => strong B pull
      scoreB += Math.min(s.memCount, 12) * 0.25; // partial memories nudge B
      if (s.usedDombra) scoreB += 1;
      if (s.reconciled) scoreB += 2;
      else if (!s.ayaulymLeft) scoreB += 0.5;    // at least she stayed

      // C accrues from the understanding lean toward Серік.
      if (s.serikPath === "understand") scoreC += 4;  // (already returned above, but safe)
      if (s.serikPath === "music") scoreC += 0.5;     // a soft, non-violent lean
      if (s.serikPath === "neutral") scoreC += 0.25;

      // A accrues from violence + isolation.
      scoreA += Math.min(s.killCount, 1000) / 100; // every 100 kills => +1 toward A
      if (s.ayaulymLeft) scoreA += 2;
      if (!s.memComplete) scoreA += 0.5;
      if (s.serikPath === "kill") scoreA += 3;

      // pick the max with the pinned tie order B > C > A
      var best = "b";
      var bestScore = scoreB;
      if (scoreC > bestScore) { best = "c"; bestScore = scoreC; }
      if (scoreA > bestScore) { best = "a"; bestScore = scoreA; }
      // ensure ties resolve B>C>A even if A or C merely equals current best
      if (best !== "b" && scoreB === bestScore) best = "b";
      else if (best === "a" && scoreC === bestScore) best = "c";

      this.id = best;
      return best;
    }
  };

  return api;
})();

/* ---------- tiny local guards (do NOT redefine engine helpers) -------- */
function _ui_audio(name) {

    try { Audio.playCue(name); } catch (e) {}
  }
}
function _ui_stopMusic() {
  if (typeof Audio !== "undefined" && Audio && typeof Audio.stopMusic === "function") {
    try { Audio.stopMusic(); } catch (e) {}

    try { Sprites.draw(c, key, x, y, scale, opts); } catch (e) {}

}
function _ui_hasSprite(key) {
  return (typeof Sprites !== "undefined" && Sprites && typeof Sprites.has === "function" && Sprites.has(key));
}
function _ui_restoredPct() {
  // contract: Decay.restoredPercent() -> 0..100. Tolerate a restoredPct alias too.
  if (typeof Decay !== "undefined" && Decay) {
    try {
      if (typeof Decay.restoredPercent === "function") return clamp(Decay.restoredPercent() | 0, 0, 100);
      if (typeof Decay.restoredPct === "function") return clamp(Decay.restoredPct() | 0, 0, 100);
    } catch (e) {}
  }
  return 0;
}
function _ui_activeQuests() {
  if (typeof Quests !== "undefined" && Quests && typeof Quests.active === "function") {
    try { var a = Quests.active(); return Array.isArray(a) ? a : []; } catch (e) {}
  }
